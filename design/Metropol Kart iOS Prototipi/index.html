  window.TabTitle = TabTitle;

  function brandLogo(brand, accent, size = 48, r = 13) {
    return (
      <div style={{ width: size, height: size, borderRadius: r, background: hexA(accent, 0.14), display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>
        <span style={{ fontSize: size * 0.4, fontWeight: 800, color: accent, letterSpacing: -0.5 }}>{brand[0]}</span>
      </div>
    );
  }
  window.brandLogo = brandLogo;

  function Benefits() {
    const app = window.useApp();
    const tiles = app.store.benefitTiles;
    const route = (t) => {
      if (t.title === 'Kampanyalar') app.go('campaignList');
      else if (t.title === 'Hediye Çekleri') app.go('giftCards');
      else app.go('campaignList', { title: t.title });
    };
    return (
      <window.Screen padBottom={120}>
        <TabTitle title="Yan Haklar" sub="Avantajlar & hediyeler" />
        <div style={{ padding: 16 }}>
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 14 }}>
            {tiles.map(t => (
              <button key={t.id} onClick={() => route(t)} style={{ background: T.card, border: 'none', borderRadius: 18, overflow: 'hidden', cursor: 'pointer', boxShadow: T.shadowSm, fontFamily: T.font, padding: 0, textAlign: 'left' }}>
                <div style={{ position: 'relative' }}>
                  <Ph h={92} r={0} accent={t.accent} label="" />
                  <div style={{ position: 'absolute', top: 12, left: 12, width: 40, height: 40, borderRadius: 12, background: '#fff', display: 'flex', alignItems: 'center', justifyContent: 'center', boxShadow: T.shadowSm }}>
                    <Icon name={t.icon} size={22} color={t.accent} strokeWidth={2} />
                  </div>
                </div>
                <div style={{ padding: '12px 14px 14px', fontSize: 15, fontWeight: 700, color: T.ink, letterSpacing: -0.2 }}>{t.title}</div>
              </button>
            ))}
          </div>
        </div>
      </window.Screen>
    );
  }

  function CampaignList({ title = 'Kampanyalar' }) {
    const app = window.useApp();
    return (
      <window.Screen padBottom={28}>
        <window.TopBar title={title} onBack={app.back} brand />
        <div style={{ padding: 16 }}>
          <Panel pad={0}>
            {app.store.campaigns.map((c, i, arr) => (
              <Row key={c.id} icon={brandLogo(c.brand, c.accent, 44)} title={c.title} sub={`${c.brand} · ${c.cat}`} chevron last={i === arr.length - 1} onClick={() => app.go('campaignDetail', { id: c.id })} />
            ))}
          </Panel>
        </div>
      </window.Screen>
    );
  }

  function CampaignDetail({ id }) {
    const app = window.useApp();
    const c = app.store.campaigns.find(x => x.id === id) || app.store.campaigns[0];
    const similar = app.store.campaigns.filter(x => x.id !== c.id);
    return (
      <window.Screen padBottom={28}>
        <window.TopBar title="Kampanya" onBack={app.back} brand />
        <Ph h={170} r={0} accent={c.accent} label={`${c.brand.toUpperCase()} · KAMPANYA GÖRSELİ`} style={{ borderRadius: 0, borderLeft: 'none', borderRight: 'none' }} />
        <div style={{ padding: '0 18px' }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 12, marginTop: -28, marginBottom: 16 }}>
            <div style={{ boxShadow: T.shadow, borderRadius: 18 }}>{brandLogo(c.brand, c.accent, 64, 18)}</div>
            <div style={{ paddingTop: 24 }}><Badge color={c.accent}>{c.cat}</Badge></div>
          </div>
          <h1 style={{ margin: 0, fontSize: 22, fontWeight: 800, color: T.ink, letterSpacing: -0.5, lineHeight: 1.25 }}>{c.title}</h1>
          <p style={{ fontSize: 15, color: T.ink2, lineHeight: 1.6, marginTop: 12 }}>{c.desc}</p>
          <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap', marginTop: 14 }}>
            {['Metropol Kart geçerli', 'Son: 31.12.2026', 'Tüm şubeler'].map(t => (
              <span key={t} style={{ fontSize: 12.5, fontWeight: 600, color: T.ink2, background: hexA(T.navy, 0.05), padding: '7px 12px', borderRadius: 999 }}>{t}</span>
            ))}
          </div>
          <div style={{ marginTop: 22 }}><Btn variant="coral" onClick={() => app.showToast('Kampanya detayları gönderildi')}>Detaylı Bilgi Al</Btn></div>

          <div style={{ marginTop: 28 }}>
            <h3 style={{ margin: '0 0 12px', fontSize: 17, fontWeight: 800, color: T.ink }}>Benzer Kampanyalar</h3>
            <div style={{ display: 'flex', gap: 12, overflowX: 'auto', margin: '0 -18px', padding: '0 18px 4px', scrollbarWidth: 'none' }}>
              {similar.map(s => (
                <button key={s.id} onClick={() => app.go('campaignDetail', { id: s.id })} style={{ flex: '0 0 200px', textAlign: 'left', background: T.card, border: 'none', borderRadius: 16, overflow: 'hidden', boxShadow: T.shadowSm, cursor: 'pointer', fontFamily: T.font, padding: 0 }}>
                  <Ph h={86} r={0} accent={s.accent} label={s.brand.toUpperCase()} />
                  <div style={{ padding: 12 }}>
                    <div style={{ fontSize: 13, fontWeight: 700, color: T.ink, lineHeight: 1.3, display: '-webkit-box', WebkitLineClamp: 2, WebkitBoxOrient: 'vertical', overflow: 'hidden' }}>{s.title}</div>
                  </div>
                </button>
              ))}
            </div>
          </div>
        </div>
      </window.Screen>
    );
  }

  function GiftCards() {
    const app = window.useApp();
    return (
      <window.Screen padBottom={28}>
        <window.TopBar title="Hediye Çekleri" onBack={app.back} brand />
        <div style={{ padding: 16, display: 'flex', flexDirection: 'column', gap: 14 }}>
          {app.store.giftCards.map(g => (
            <div key={g.id} style={{ background: `linear-gradient(135deg, ${g.accent}, ${window.hexA(g.accent, 0.78)})`, borderRadius: 18, padding: 18, color: '#fff', boxShadow: `0 10px 24px ${hexA(g.accent, 0.32)}`, position: 'relative', overflow: 'hidden' }}>
              <div style={{ position: 'absolute', right: -20, top: -20, width: 120, height: 120, borderRadius: 999, background: 'rgba(255,255,255,0.12)' }} />
              <div style={{ position: 'relative', display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start' }}>
                <div>
                  <div style={{ width: 44, height: 44, borderRadius: 12, background: 'rgba(255,255,255,0.9)', display: 'flex', alignItems: 'center', justifyContent: 'center', marginBottom: 14 }}><span style={{ fontSize: 20, fontWeight: 800, color: g.accent }}>{g.brand[0]}</span></div>
                  <div style={{ fontSize: 16, fontWeight: 700, opacity: 0.95 }}>{g.brand} Hediye Çeki</div>
                  <div style={{ fontSize: 34, fontWeight: 800, letterSpacing: -1, marginTop: 2 }}>{fmt(g.amount)} ₺</div>
                </div>
                <Icon name="gift" size={26} color="rgba(255,255,255,0.9)" strokeWidth={1.8} />
              </div>
              <div style={{ position: 'relative', display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginTop: 16 }}>
                <span style={{ fontSize: 12.5, opacity: 0.9 }}>Son kullanma: {g.exp}</span>
                <button onClick={() => app.showToast('Hediye çeki kullanıldı')} style={{ background: '#fff', border: 'none', borderRadius: 999, padding: '9px 20px', fontSize: 14, fontWeight: 800, color: g.accent, cursor: 'pointer', fontFamily: T.font }}>Kullan</button>
              </div>
            </div>
          ))}
        </div>
      </window.Screen>
    );
  }

  Object.assign(window.SCREENS, {
    benefits: { C: Benefits },
    campaignList: { C: CampaignList, full: true },
    campaignDetail: { C: CampaignDetail, full: true },
    giftCards: { C: GiftCards, full: true },
  });
})();

</script>

<script type="text/babel" data-file="screens-metropol-home.jsx">
// screens-metropol-home.jsx — card visual + Metropol main screen (3 variants)
(function () {
  const { T, fmt, hexA, Btn, Row, Panel, SectionTitle, Ph } = window;
  const Icon = window.Icon;
  window.SCREENS = window.SCREENS || {};

  const groupNo = (n) => n.replace(/(.{4})/g, '$1 ').trim();
  const maskNo = (n) => '•••• •••• •••• ' + n.slice(-4);
  const cardTotal = (c) => c.w.resto + c.w.market + c.w.gift;

  // gradients per card
  const GRAD = [
    `linear-gradient(135deg, #34315F 0%, #2D2A5A 45%, ${T.brand} 140%)`,
    `linear-gradient(135deg, ${T.brand} 0%, ${T.brandDark} 60%, #34315F 150%)`,
  ];

  // ── The card ────────────────────────────────────────────────
  function CardVisual({ card, idx = 0, onRefresh, onCopy, onDelete, mask = false, compact = false }) {
    return (
      <div style={{
        position: 'relative', width: '100%', aspectRatio: '1.58 / 1', borderRadius: 20, overflow: 'hidden',
        background: GRAD[idx % GRAD.length], color: '#fff', padding: compact ? 16 : 20, boxSizing: 'border-box',
        display: 'flex', flexDirection: 'column', justifyContent: 'space-between',
        boxShadow: '0 14px 30px rgba(45,42,90,0.34)',
      }}>
        {/* sheen */}
        <div style={{ position: 'absolute', inset: 0, background: 'radial-gradient(120% 80% at 85% 0%, rgba(255,255,255,0.16), transparent 55%)', pointerEvents: 'none' }} />
        {/* top row */}
        <div style={{ display: 'flex', alignItems: 'flex-start', justifyContent: 'space-between', position: 'relative' }}>
          <div style={{ display: 'flex', gap: 8 }}>
            {onRefresh && <CircBtn icon="refresh" onClick={onRefresh} />}
            {onDelete && <CircBtn icon="trash" onClick={onDelete} />}
          </div>
          <div style={{ display: 'flex', alignItems: 'center', gap: 6, opacity: 0.96 }}>
            <div style={{ width: 20, height: 20, borderRadius: 6, background: '#fff', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
              <div style={{ width: 8, height: 8, borderRadius: 3, background: T.brand }} />
            </div>
            <span style={{ fontSize: 13, fontWeight: 800, letterSpacing: -0.3 }}>metropol<span style={{ fontWeight: 500, opacity: 0.7 }}>kart</span></span>
          </div>
        </div>
        {/* chip */}
        {!compact && (
          <div style={{ position: 'relative', width: 38, height: 28, borderRadius: 7, background: 'linear-gradient(135deg,#F4D58A,#D9B25C)', marginTop: -2,
            boxShadow: 'inset 0 0 0 1px rgba(255,255,255,0.3)' }}>
            <div style={{ position: 'absolute', inset: 5, borderRadius: 3, border: '1px solid rgba(0,0,0,0.18)' }} />
          </div>
        )}
        {/* number + holder + nfc */}
        <div style={{ position: 'relative' }}>
          <div style={{ fontFamily: 'ui-monospace, SFMono-Regular, Menlo, monospace', fontSize: compact ? 15 : 18, fontWeight: 600, letterSpacing: 1.5, marginBottom: 10, textShadow: '0 1px 2px rgba(0,0,0,0.2)' }}>
            {mask ? maskNo(card.number) : groupNo(card.number)}
          </div>
          <div style={{ display: 'flex', alignItems: 'flex-end', justifyContent: 'space-between' }}>
            <div>
              <div style={{ fontSize: 9, fontWeight: 600, opacity: 0.6, letterSpacing: 0.5, marginBottom: 2 }}>KART SAHİBİ</div>
              <div style={{ fontSize: 14, fontWeight: 700, letterSpacing: 0.3 }}>{card.holder}</div>
            </div>
            <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
              {onCopy && <button onClick={onCopy} style={{ background: 'none', border: 'none', padding: 0, cursor: 'pointer' }}><Icon name="copy" size={20} color="rgba(255,255,255,0.85)" /></button>}
              <Icon name="nfc" size={22} color="rgba(255,255,255,0.85)" strokeWidth={2} />
            </div>
          </div>
        </div>
      </div>
    );
  }
  function CircBtn({ icon, onClick }) {
    return (
      <button onClick={onClick} style={{ width: 30, height: 30, borderRadius: 999, background: 'rgba(255,255,255,0.18)', border: 'none', cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center', backdropFilter: 'blur(6px)' }}>
        <Icon name={icon} size={16} color="#fff" strokeWidth={2} />
      </button>
    );
  }

  function AddCardTile({ onClick }) {
    return (
      <button onClick={onClick} style={{
        width: '100%', aspectRatio: '1.58 / 1', borderRadius: 20, cursor: 'pointer',
        border: `2px dashed ${hexA(T.navy, 0.25)}`, background: hexA(T.navy, 0.03), color: T.navy,
        display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: 10, fontFamily: T.font,
      }}>
        <div style={{ width: 48, height: 48, borderRadius: 999, background: T.brandSoft, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
          <Icon name="plus" size={26} color={T.brand} strokeWidth={2.2} />
        </div>
        <span style={{ fontSize: 15, fontWeight: 700 }}>Kart Ekle</span>
      </button>
    );
  }

  // horizontal snap slider for cards
  function CardSlider({ children, onIndex, count }) {
    const ref = React.useRef();
    const [i, setI] = React.useState(0);
    const onScroll = () => {
      if (!ref.current) return;
      const w = ref.current.clientWidth;
      const idx = Math.round(ref.current.scrollLeft / w);
      if (idx !== i) { setI(idx); onIndex && onIndex(idx); }
    };
    return (
      <div>
        <div ref={ref} onScroll={onScroll} style={{ display: 'flex', overflowX: 'auto', scrollSnapType: 'x mandatory', gap: 0, scrollbarWidth: 'none', WebkitOverflowScrolling: 'touch' }}>
          {React.Children.map(children, (ch, k) => (
            <div style={{ flex: '0 0 100%', scrollSnapAlign: 'center', padding: '0 18px', boxSizing: 'border-box' }}>{ch}</div>
          ))}
        </div>
        <div style={{ display: 'flex', justifyContent: 'center', gap: 6, marginTop: 12 }}>
          {Array.from({ length: count }).map((_, k) => (
            <div key={k} style={{ width: k === i ? 18 : 6, height: 6, borderRadius: 999, background: k === i ? T.brand : hexA(T.navy, 0.2), transition: 'all .2s' }} />
          ))}
        </div>
      </div>
    );
  }
  window.CardVisual = CardVisual; window.cardTotal = cardTotal; window.groupNo = groupNo; window.maskNo = maskNo;

  // ── balance pills ───────────────────────────────────────────
  const WALLETS = [
    { key: 'total', label: 'TOPLAM', color: T.purple, icon: 'wallet' },
    { key: 'resto', label: 'RESTORAN', color: T.coral, icon: 'fork' },
    { key: 'market', label: 'MARKET', color: T.blue, icon: 'basket' },
    { key: 'gift', label: 'HEDİYE', color: '#E0883B', icon: 'gift' },
  ];
  window.WALLETS = WALLETS;
  function balOf(card, key) { return key === 'total' ? cardTotal(card) : card.w[key]; }

  function BalanceCards({ card }) {
    return (
      <div style={{ display: 'flex', gap: 12, overflowX: 'auto', padding: '0 18px 4px', scrollbarWidth: 'none' }}>
        {WALLETS.map(w => (
          <div key={w.key} style={{ flex: '0 0 158px', background: T.card, borderRadius: 16, padding: 15, boxShadow: T.shadowSm, borderTop: `3px solid ${w.color}` }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 7, marginBottom: 12 }}>
              <div style={{ width: 26, height: 26, borderRadius: 8, background: hexA(w.color, 0.14), display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                <Icon name={w.icon} size={15} color={w.color} strokeWidth={2} />
              </div>
              <span style={{ fontSize: 11, fontWeight: 800, color: w.color, letterSpacing: 0.3 }}>{w.label}</span>
            </div>
            <div style={{ fontSize: 22, fontWeight: 800, color: T.ink, letterSpacing: -0.5 }}>{fmt(balOf(card, w.key))} <span style={{ fontSize: 15 }}>₺</span></div>
            <div style={{ fontSize: 11.5, color: T.ink2, marginTop: 2 }}>Kullanılabilir Bakiye</div>
          </div>
        ))}
      </div>
    );
  }

  // ── action grid ─────────────────────────────────────────────
  const ACTIONS = [
    { id: 'pay', title: 'Harcama Yap', sub: 'QR veya kısa kod', icon: 'qr', accent: T.coral, go: 'payChoose' },
    { id: 'explore', title: 'Keşfet', sub: 'Üye iş yerleri', icon: 'pin', accent: T.blue, go: 'explore' },
    { id: 'history', title: 'İşlem Geçmişi', sub: 'Tüm hareketler', icon: 'history', accent: T.purple, go: 'history' },
    { id: 'transfer', title: 'Bakiye Transferi', sub: 'Karta / cebe gönder', icon: 'transfer', accent: T.green, go: 'transferMenu' },
  ];

  function ActionGrid({ app }) {
    return (
      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12 }}>
        {ACTIONS.map(a => (
          <button key={a.id} onClick={() => app.go(a.go)} style={{
            background: T.card, borderRadius: 16, border: 'none', cursor: 'pointer', padding: 15, textAlign: 'left',
            boxShadow: T.shadowSm, fontFamily: T.font, display: 'flex', flexDirection: 'column', gap: 10,
          }}>
            <div style={{ width: 42, height: 42, borderRadius: 13, background: hexA(a.accent, 0.13), display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
              <Icon name={a.icon} size={22} color={a.accent} strokeWidth={2} />
            </div>
            <div>
              <div style={{ fontSize: 15, fontWeight: 700, color: T.ink, letterSpacing: -0.2 }}>{a.title}</div>
              <div style={{ fontSize: 12, color: T.ink2, marginTop: 1 }}>{a.sub}</div>
            </div>
          </button>
        ))}
      </div>
    );
  }

  // ── recent transactions ─────────────────────────────────────
  function TxRow({ tx, last }) {
    const pos = tx.amount > 0;
    const w = WALLETS.find(x => x.label === tx.wallet) || WALLETS[1];
    return (
      <Row last={last}
        icon={tx.kind === 'TRANSFER' ? 'transfer' : tx.kind === 'YÜKLEME' ? 'arrowDown' : w.icon}
        iconBg={hexA(w.color, 0.13)} iconColor={w.color}
        title={tx.name}
        sub={`${tx.type} · ${tx.kind} · ${tx.date} ${tx.time}`}
        right={<div style={{ textAlign: 'right' }}>
          <div style={{ fontSize: 15.5, fontWeight: 800, color: pos ? T.green : T.ink, letterSpacing: -0.3 }}>{pos ? '+' : '−'}{fmt(Math.abs(tx.amount))} ₺</div>
        </div>} />
    );
  }
  window.TxRow = TxRow;

  // ── MAIN SCREEN ─────────────────────────────────────────────
  function Metropol() {
    const app = window.useApp();
    const cards = app.store.cards;
    const activeIdx = Math.max(0, cards.findIndex(c => c.id === app.activeCard));
    const card = cards[activeIdx] || cards[0];
    const recent = app.store.tx.filter(t => t.cardId === (card && card.id)).slice(0, 5);
    const v = app.homeVariant;

    return (
      <window.Screen padBottom={120}>
        {/* header */}
        <div style={{ paddingTop: window.STATUS_H, background: T.card, paddingBottom: 14, borderBottom: `1px solid ${T.line2}` }}>
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '6px 18px 12px' }}>
            <div>
              <div style={{ fontSize: 13, color: T.ink2, fontWeight: 600 }}>Cüzdanım</div>
              <div style={{ fontSize: 24, fontWeight: 800, color: T.ink, letterSpacing: -0.6 }}>Metropol Kart</div>
            </div>
            <button onClick={() => app.go('cardDetail', { cardId: card.id })} style={{ width: 42, height: 42, borderRadius: 999, background: T.brandSoft, border: 'none', cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
              <Icon name="settings" size={22} color={T.brand} strokeWidth={1.9} />
            </button>
          </div>
          <div style={{ padding: '0 18px' }}>
            <window.Segmented value={v} onChange={app.setHomeVariant}
              options={[{ value: 1, label: 'Klasik' }, { value: 2, label: 'Tek Bakiye' }, { value: 3, label: 'Cüzdanlar' }]} />
          </div>
        </div>

        <div style={{ paddingTop: 18 }}>
          {/* card slider */}
          <CardSlider count={cards.length + 1} onIndex={(i) => { if (cards[i]) app.setActiveCard(cards[i].id); }}>
            {cards.map((c, i) => (
              <CardVisual key={c.id} card={c} idx={i}
                onRefresh={() => app.showToast('Bakiye güncellendi')}
                onCopy={() => app.showToast('Kart numarası kopyalandı')}
                onDelete={() => app.go('cardDelete', { cardId: c.id })} />
            ))}
            <AddCardTile onClick={() => app.go('cardAdd1')} />
          </CardSlider>

          {/* variant body */}
          <div style={{ padding: '22px 18px 0' }}>
            {v === 1 && <VariantClassic app={app} card={card} />}
            {v === 2 && <VariantUnified app={app} card={card} />}
            {v === 3 && <VariantWallets app={app} card={card} />}
          </div>

          {/* recent */}
          <div style={{ padding: '24px 18px 0' }}>
            <SectionTitle action="Tümü" onAction={() => app.go('history')}>Son 5 İşlem</SectionTitle>
            <Panel pad={0}>
              {recent.length ? recent.map((t, i) => <TxRow key={t.id} tx={t} last={i === recent.length - 1} />)
                : <window.Empty icon="history" title="Henüz işlem yok" sub="Bu karta ait işlemler burada görünecek." />}
            </Panel>
          </div>
        </div>
      </window.Screen>
    );
  }

  // Variant 1 — classic: balance cards + 2x2 action grid
  function VariantClassic({ app, card }) {
    return (
      <div>
        <div style={{ margin: '0 -18px 20px' }}><BalanceCards card={card} /></div>
        <ActionGrid app={app} />
      </div>
    );
  }

  // Variant 2 — unified hero: one big balance card with wallet split, circular actions
  function VariantUnified({ app, card }) {
    const total = cardTotal(card);
    const segs = [['resto', T.coral], ['market', T.blue], ['gift', '#E0883B']];
    return (
      <div>
        <div style={{ background: T.navy, borderRadius: 22, padding: 20, color: '#fff', boxShadow: '0 12px 30px rgba(45,42,90,0.28)' }}>
          <div style={{ fontSize: 12, fontWeight: 600, opacity: 0.7, letterSpacing: 0.3 }}>TOPLAM KULLANILABİLİR BAKİYE</div>
          <div style={{ fontSize: 38, fontWeight: 800, letterSpacing: -1, marginTop: 4 }}>{fmt(total)} <span style={{ fontSize: 22 }}>₺</span></div>
          <div style={{ display: 'flex', height: 8, borderRadius: 999, overflow: 'hidden', marginTop: 16, gap: 2 }}>
            {segs.map(([k, c]) => <div key={k} style={{ flex: card.w[k] || 0.001, background: c }} />)}
          </div>
          <div style={{ display: 'flex', justifyContent: 'space-between', marginTop: 14 }}>
            {segs.map(([k, c]) => {
              const w = window.WALLETS.find(x => x.key === k);
              return (
                <div key={k} style={{ flex: 1 }}>
                  <div style={{ display: 'flex', alignItems: 'center', gap: 5 }}><div style={{ width: 7, height: 7, borderRadius: 2, background: c }} /><span style={{ fontSize: 10.5, fontWeight: 700, opacity: 0.75 }}>{w.label}</span></div>
                  <div style={{ fontSize: 15, fontWeight: 800, marginTop: 3 }}>{fmt(card.w[k])} ₺</div>
                </div>
              );
            })}
          </div>
        </div>
        <div style={{ display: 'flex', justifyContent: 'space-between', marginTop: 20, padding: '0 4px' }}>
          {ACTIONS.map(a => (
            <button key={a.id} onClick={() => app.go(a.go)} style={{ background: 'none', border: 'none', cursor: 'pointer', display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 8, fontFamily: T.font, flex: 1 }}>
              <div style={{ width: 54, height: 54, borderRadius: 18, background: hexA(a.accent, 0.13), display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                <Icon name={a.icon} size={24} color={a.accent} strokeWidth={2} />
              </div>
              <span style={{ fontSize: 11.5, fontWeight: 600, color: T.ink, textAlign: 'center', lineHeight: 1.2 }}>{a.title.split(' ')[0]}</span>
            </button>
          ))}
        </div>
      </div>
    );
  }

  // Variant 3 — stacked wallet rows + action list
  function VariantWallets({ app, card }) {
    const total = cardTotal(card);
    return (
      <div>
        {window.WALLETS.filter(w => w.key !== 'total').map(w => {
          const val = card.w[w.key];
          return (
            <div key={w.key} style={{ background: T.card, borderRadius: 16, boxShadow: T.shadowSm, padding: 16, marginBottom: 12, display: 'flex', alignItems: 'center', gap: 14 }}>
              <div style={{ width: 46, height: 46, borderRadius: 14, background: hexA(w.color, 0.13), display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>
                <Icon name={w.icon} size={24} color={w.color} strokeWidth={1.9} />
              </div>
              <div style={{ flex: 1 }}>
                <div style={{ fontSize: 14, fontWeight: 700, color: T.ink }}>{w.label} Cüzdanı</div>
                <div style={{ height: 6, borderRadius: 999, background: hexA(w.color, 0.12), marginTop: 8, overflow: 'hidden' }}>
                  <div style={{ height: '100%', width: `${Math.min(100, (val / (total || 1)) * 100)}%`, background: w.color, borderRadius: 999 }} />
                </div>
              </div>
              <div style={{ fontSize: 18, fontWeight: 800, color: T.ink, letterSpacing: -0.4 }}>{fmt(val)} <span style={{ fontSize: 13 }}>₺</span></div>
            </div>
          );
        })}
        <Panel pad={0} style={{ marginTop: 16 }}>
          {ACTIONS.map((a, i) => (
            <Row key={a.id} icon={a.icon} iconBg={hexA(a.accent, 0.13)} iconColor={a.accent} title={a.title} sub={a.sub} chevron last={i === ACTIONS.length - 1} onClick={() => app.go(a.go)} />
          ))}
        </Panel>
      </div>
    );
  }

  window.SCREENS.metropol = { C: Metropol, full: false };
})();

</script>

<script type="text/babel" data-file="screens-metropol-cards.jsx">
// screens-metropol-cards.jsx — add card flow (3 steps), card detail, delete.
(function () {
  const { T, fmt, hexA, Btn, Field, Input, CodeInput, Panel, Row, SectionTitle, Segmented } = window;
  const Icon = window.Icon;
  window.SCREENS = window.SCREENS || {};

  const Flow = ({ title, step, total, onBack, children, footer }) => (
    <window.Screen padBottom={20}>
      <window.TopBar title={title} onBack={onBack} brand />
      <div style={{ padding: '4px 18px 0' }}>
        <div style={{ display: 'flex', gap: 6, marginBottom: 22 }}>
          {Array.from({ length: total }).map((_, i) => (
            <div key={i} style={{ flex: 1, height: 5, borderRadius: 999, background: i < step ? T.brand : hexA(T.navy, 0.12), transition: 'background .3s' }} />
          ))}
        </div>
        {children}
      </div>
      <div style={{ padding: '20px 18px 0' }}>{footer}</div>
    </window.Screen>
  );

  // Step 1 — number + phone
  function CardAdd1() {
    const app = window.useApp();
    const [no, setNo] = React.useState('');
    const [phone, setPhone] = React.useState('');
    const fmtNo = (v) => v.replace(/\D/g, '').slice(0, 16).replace(/(.{4})/g, '$1 ').trim();
    return (
      <Flow title="Kart Ekle" step={1} total={3} onBack={app.back}
        footer={<Btn variant="coral" disabled={no.replace(/\s/g, '').length < 16 || phone.length < 10} onClick={() => app.go('cardAdd2', { no, phone })}>Devam Et</Btn>}>
        <h2 style={{ margin: '0 0 6px', fontSize: 22, fontWeight: 800, color: T.ink, letterSpacing: -0.5 }}>Kart bilgileriniz</h2>
        <p style={{ margin: '0 0 22px', fontSize: 14.5, color: T.ink2, lineHeight: 1.5 }}>Metropol Kart numaranızı ve karta tanımlı telefon numaranızı girin.</p>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
          <Field label="Kart Numarası"><Input value={fmtNo(no)} onChange={v => setNo(v.replace(/\D/g, '').slice(0, 16))} placeholder="6375 •••• •••• ••••" inputMode="numeric" icon="card" /></Field>
          <Field label="Telefon Numarası" hint="Kart sahibine ait, kayıtlı GSM numarası."><Input value={phone} onChange={setPhone} placeholder="5XX XXX XX XX" prefix="+90" inputMode="tel" icon="phone" /></Field>
        </div>
      </Flow>
    );
  }

  // Step 2 — OTP
  function CardAdd2({ no, phone }) {
    const app = window.useApp();
    const [otp, setOtp] = React.useState('');
    const [sec, setSec] = React.useState(54);
    React.useEffect(() => { if (sec > 0) { const t = setTimeout(() => setSec(sec - 1), 1000); return () => clearTimeout(t); } }, [sec]);
    return (
      <Flow title="Kart Ekle" step={2} total={3} onBack={app.back}
        footer={<Btn variant="coral" disabled={otp.length < 6} onClick={() => app.go('cardAdd3', { no, phone })}>Doğrula</Btn>}>
        <h2 style={{ margin: '0 0 6px', fontSize: 22, fontWeight: 800, color: T.ink, letterSpacing: -0.5 }}>SMS doğrulama</h2>
        <p style={{ margin: '0 0 26px', fontSize: 14.5, color: T.ink2, lineHeight: 1.5 }}><b style={{ color: T.ink }}>+90 {phone || '5XX XXX XX XX'}</b> numarasına gönderilen kodu girin.</p>
        <CodeInput value={otp} onChange={setOtp} autoFocus />
        <div style={{ textAlign: 'center', marginTop: 20, fontSize: 14, color: T.ink2 }}>
          {sec > 0 ? <span>Tekrar gönder · <b style={{ color: T.ink }}>0:{String(sec).padStart(2, '0')}</b></span>
            : <button onClick={() => setSec(54)} style={{ background: 'none', border: 'none', color: T.brand, fontWeight: 700, fontSize: 14, cursor: 'pointer', fontFamily: T.font }}>Kodu tekrar gönder</button>}
        </div>
      </Flow>
    );
  }

  // Step 3 — user info + confirm
  function CardAdd3({ no, phone }) {
    const app = window.useApp();
    const [f, setF] = React.useState({ first: 'Elif', last: 'Yıldırım', email: 'elif.yildirim@firma.com', tc: '' });
    const finish = () => {
      const id = 'c' + (app.store.cards.length + 1);
      app.update(s => s.cards.push({ id, holder: `${f.first.toUpperCase()} ${f.last.toUpperCase()}`, number: (no.replace(/\D/g, '') || '6375000011112222'), w: { resto: 0, market: 0, gift: 0 } }));
      app.setActiveCard(id);
      app.reset();
      app.showToast('Kart başarıyla eklendi 🎉');
    };
    return (
      <Flow title="Kart Ekle" step={3} total={3} onBack={app.back}
        footer={<Btn variant="green" icon="check" onClick={finish} disabled={!f.first || !f.last || !f.email}>Onayla ve Ekle</Btn>}>
        <h2 style={{ margin: '0 0 6px', fontSize: 22, fontWeight: 800, color: T.ink, letterSpacing: -0.5 }}>Kullanıcı bilgileri</h2>
        <p style={{ margin: '0 0 22px', fontSize: 14.5, color: T.ink2, lineHeight: 1.5 }}>Kart sahibine ait bilgileri doğrulayın.</p>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
          <div style={{ display: 'flex', gap: 12 }}>
            <Field label="Ad" style={{ flex: 1 }}><Input value={f.first} onChange={v => setF({ ...f, first: v })} /></Field>
            <Field label="Soyad" style={{ flex: 1 }}><Input value={f.last} onChange={v => setF({ ...f, last: v })} /></Field>
          </div>
          <Field label="E-posta"><Input value={f.email} onChange={v => setF({ ...f, email: v })} icon="mail" inputMode="email" /></Field>
          <Field label="T.C. Kimlik No (opsiyonel)"><Input value={f.tc} onChange={v => setF({ ...f, tc: v.replace(/\D/g, '').slice(0, 11) })} placeholder="•••••••••••" inputMode="numeric" /></Field>
        </div>
      </Flow>
    );
  }

  // Card detail — 2 tabs
  function CardDetail({ cardId }) {
    const app = window.useApp();
    const card = app.cardById(cardId) || app.store.cards[0];
    const [tab, setTab] = React.useState('balances');
    const idx = app.store.cards.findIndex(c => c.id === card.id);
    const recent = app.store.tx.filter(t => t.cardId === card.id).slice(0, 5);
    return (
      <window.Screen padBottom={28}>
        <window.TopBar title="Kart Detayı" onBack={app.back} brand />
        <div style={{ padding: '14px 18px 0' }}>
          <window.CardVisual card={card} idx={idx} mask onCopy={() => app.showToast('Kart numarası kopyalandı')} />
          <div style={{ marginTop: 18 }}>
            <Segmented value={tab} onChange={setTab} options={[{ value: 'balances', label: 'Bakiyeler' }, { value: 'actions', label: 'İşlemler' }]} />
          </div>
        </div>
        {tab === 'balances' ? (
          <div style={{ padding: '20px 18px 0' }}>
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12, marginBottom: 22 }}>
              {[['resto', 'RESTOPAY', T.coral, 'fork'], ['gift', 'GIFTPAY', '#E0883B', 'gift']].map(([k, lbl, c, ic]) => (
                <div key={k} style={{ background: T.card, borderRadius: 16, padding: 16, boxShadow: T.shadowSm, borderTop: `3px solid ${c}` }}>
                  <div style={{ display: 'flex', alignItems: 'center', gap: 7, marginBottom: 10 }}>
                    <div style={{ width: 28, height: 28, borderRadius: 9, background: hexA(c, 0.14), display: 'flex', alignItems: 'center', justifyContent: 'center' }}><Icon name={ic} size={16} color={c} strokeWidth={2} /></div>
                    <span style={{ fontSize: 11.5, fontWeight: 800, color: c }}>{lbl}</span>
                  </div>
                  <div style={{ fontSize: 21, fontWeight: 800, color: T.ink, letterSpacing: -0.5 }}>{fmt(k === 'resto' ? card.w.resto + card.w.market : card.w.gift)} <span style={{ fontSize: 14 }}>₺</span></div>
                  <div style={{ fontSize: 11.5, color: T.ink2, marginTop: 2 }}>Kullanılabilir Bakiye</div>
                </div>
              ))}
            </div>
            <SectionTitle action="Tümü" onAction={() => app.go('history')}>Son 5 İşlem</SectionTitle>
            <Panel pad={0}>{recent.length ? recent.map((t, i) => <window.TxRow key={t.id} tx={t} last={i === recent.length - 1} />) : <window.Empty icon="history" title="İşlem yok" />}</Panel>
          </div>
        ) : (
          <div style={{ padding: '20px 18px 0' }}>
            <Panel pad={0}>
              <Row icon="transfer" iconBg={hexA(T.green, 0.14)} iconColor={T.green} title="Bakiye Transferi" sub="Karta veya cebe gönder" chevron onClick={() => { app.switchTab('metropol'); app.go('transferMenu'); }} />
              <Row icon="history" iconBg={hexA(T.purple, 0.14)} iconColor={T.purple} title="İşlem Geçmişi" sub="Tüm hareketler" chevron onClick={() => app.go('history')} />
              <Row icon="settings" iconBg={hexA(T.blue, 0.14)} iconColor={T.blue} title="Kullanım Ayarları" sub="Limit, online ödeme, NFC" chevron onClick={() => app.showToast('Kullanım ayarları açıldı')} last />
            </Panel>
            <div style={{ marginTop: 16 }}>
              <Panel pad={0}>
                <Row icon="trash" iconBg={hexA(T.coral, 0.14)} iconColor={T.coral} title="Kartı Sil" sub="Bu kartı hesabınızdan kaldır" danger chevron last onClick={() => app.go('cardDelete', { cardId: card.id })} />
              </Panel>
            </div>
          </div>
        )}
      </window.Screen>
    );
  }

  // Delete confirm — full screen dialog
  function CardDelete({ cardId }) {
    const app = window.useApp();
    const card = app.cardById(cardId) || app.store.cards[0];
    const del = () => {
      app.update(s => s.cards = s.cards.filter(c => c.id !== cardId));
      const left = app.store.cards.filter(c => c.id !== cardId);
      app.setActiveCard(left[0] ? left[0].id : null);
      app.reset();
      app.showToast('Kart silindi');
    };
    return (
      <div style={{ position: 'absolute', inset: 0, background: 'rgba(28,27,46,0.55)', display: 'flex', flexDirection: 'column', justifyContent: 'flex-end', zIndex: 1, animation: 'fadeBg .25s' }}>
        <div onClick={app.back} style={{ flex: 1 }} />
        <div style={{ background: T.card, borderRadius: '28px 28px 0 0', padding: '28px 24px calc(env(safe-area-inset-bottom) + 32px)', animation: 'sheetUp .3s cubic-bezier(.2,.8,.3,1)' }}>
          <div style={{ width: 40, height: 5, borderRadius: 999, background: hexA(T.navy, 0.15), margin: '0 auto 22px' }} />
          <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', textAlign: 'center', marginBottom: 24 }}>
            <div style={{ width: 64, height: 64, borderRadius: 20, background: hexA(T.coral, 0.13), display: 'flex', alignItems: 'center', justifyContent: 'center', marginBottom: 16 }}>
              <Icon name="trash" size={30} color={T.coral} strokeWidth={1.8} />
            </div>
            <h2 style={{ margin: 0, fontSize: 21, fontWeight: 800, color: T.ink, letterSpacing: -0.4 }}>Kartı silmek istiyor musunuz?</h2>
            <p style={{ margin: '8px 0 0', fontSize: 14.5, color: T.ink2, lineHeight: 1.5 }}>{window.maskNo(card.number)} numaralı kart hesabınızdan kaldırılacak. Bu işlem geri alınamaz.</p>
          </div>
          <Btn variant="coral" icon="trash" onClick={del}>Evet, Kartı Sil</Btn>
          <div style={{ height: 10 }} />
          <Btn variant="ghost" onClick={app.back}>Vazgeç</Btn>
        </div>
      </div>
    );
  }

  Object.assign(window.SCREENS, {
    cardAdd1: { C: CardAdd1, full: true },
    cardAdd2: { C: CardAdd2, full: true },
    cardAdd3: { C: CardAdd3, full: true },
    cardDetail: { C: CardDetail, full: true },
    cardDelete: { C: CardDelete, full: true },
  });
})();

</script>

<script type="text/babel" data-file="screens-metropol-pay.jsx">

          </div>
        </div>
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 6, padding: '16px 0', marginTop: 14, borderTop: `1px solid ${T.line2}`, background: hexA(T.navy, 0.02) }}>
          <div style={{ width: 16, height: 16, borderRadius: 5, background: T.brand, display: 'flex', alignItems: 'center', justifyContent: 'center' }}><div style={{ width: 6, height: 6, borderRadius: 2, background: '#fff' }} /></div>
          <span style={{ fontSize: 12, fontWeight: 800, color: T.navy, letterSpacing: -0.2 }}>metropol<span style={{ fontWeight: 500, opacity: 0.6 }}>kart</span></span>
        </div>
      </div>
    );

  window.Receipt = Receipt;

  // mini card selector row

      <button onClick={onClick} style={{
        width: '100%', display: 'flex', alignItems: 'center', gap: 14, padding: 14, textAlign: 'left', fontFamily: T.font,
        background: T.card, border: `2px solid ${selected ? T.brand : T.line}`, borderRadius: 16, cursor: 'pointer',
        boxShadow: selected ? `0 6px 16px ${hexA(T.brand, 0.18)}` : 'none', transition: 'all .15s',
      }}>
        <div style={{ width: 54, height: 36, borderRadius: 8, background: idx % 2 ? `linear-gradient(135deg,${T.brand},${T.brandDark})` : 'linear-gradient(135deg,#34315F,#2D2A5A)', flexShrink: 0, display: 'flex', alignItems: 'flex-end', padding: 5, boxSizing: 'border-box' }}>
          <div style={{ width: 12, height: 9, borderRadius: 2, background: 'rgba(255,255,255,0.5)' }} />
        </div>
        <div style={{ flex: 1, minWidth: 0 }}>
          <div style={{ fontSize: 14.5, fontWeight: 700, color: T.ink }}>{card.holder}</div>
          <div style={{ fontSize: 13, color: T.ink2, fontFamily: 'ui-monospace, Menlo, monospace', marginTop: 2 }}>{window.maskNo(card.number)}</div>
        </div>
        <div style={{ width: 24, height: 24, borderRadius: 999, border: `2px solid ${selected ? T.brand : T.line}`, background: selected ? T.brand : 'transparent', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>
          {selected && <Icon name="check" size={14} color="#fff" strokeWidth={3} />}
        </div>
      </button>
    );
  }
  window.CardPick = CardPick;

  // ── 1. Choose method ────────────────────────────────────────
  function PayChoose() {
    const app = window.useApp();
    const opt = (icon, title, sub, accent, onClick) => (
      <button onClick={onClick} style={{
        background: T.card, border: 'none', borderRadius: 20, padding: 22, cursor: 'pointer', textAlign: 'left',
        boxShadow: T.shadow, fontFamily: T.font, display: 'flex', alignItems: 'center', gap: 16,
      }}>
        <div style={{ width: 58, height: 58, borderRadius: 18, background: hexA(accent, 0.13), display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>
          <Icon name={icon} size={30} color={accent} strokeWidth={1.9} />
        </div>
        <div style={{ flex: 1 }}>
          <div style={{ fontSize: 17, fontWeight: 800, color: T.ink, letterSpacing: -0.3 }}>{title}</div>

        <Icon name="chevron" size={20} color={T.ink3} strokeWidth={2} />
      </button>
    );
    return (
      <window.Screen>
        <window.TopBar title="Harcama Yap" onBack={app.back} brand />
