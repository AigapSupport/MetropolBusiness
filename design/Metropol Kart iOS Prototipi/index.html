          {opt('keypad', 'Kısa Kod ile Ödeme Yap', 'POS ekranındaki 6 haneli kodu girin.', T.purple, () => app.go('payCode'))}
        </div>
      </window.Screen>
    );
  }

  // ── 2a. QR camera ───────────────────────────────────────────
  function PayQR() {
    const app = window.useApp();
    React.useEffect(() => { const t = setTimeout(() => app.go('paySelectCard'), 2600); return () => clearTimeout(t); }, []);
    return (
      <div style={{ position: 'absolute', inset: 0, background: '#0E0D1A', display: 'flex', flexDirection: 'column' }}>
        {/* faux camera bg */}
        <div style={{ position: 'absolute', inset: 0, background: 'radial-gradient(80% 60% at 50% 40%, #2a2740, #0E0D1A)' }} />
        <div style={{ position: 'relative', paddingTop: window.STATUS_H, background: T.brand, paddingBottom: 14, zIndex: 2 }}>
          <div style={{ display: 'flex', alignItems: 'center', padding: '0 8px' }}>
            <button onClick={app.back} style={{ background: 'none', border: 'none', cursor: 'pointer', padding: 8 }}><Icon name="close" size={24} color="#fff" strokeWidth={2.4} /></button>
            <div style={{ flex: 1, textAlign: 'center', fontSize: 17, fontWeight: 700, color: '#fff', marginRight: 40 }}>QR ile Ödeme</div>
          </div>
        </div>
        <div style={{ flex: 1, position: 'relative', display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', zIndex: 2 }}>
          <div style={{ color: 'rgba(255,255,255,0.92)', fontSize: 15, fontWeight: 600, textAlign: 'center', padding: '0 40px', marginBottom: 28 }}>Lütfen POS cihazındaki<br />QR kodu okutunuz</div>
          <div style={{ position: 'relative', width: 232, height: 232 }}>
            {[[0, 0, 'tl'], [1, 0, 'tr'], [0, 1, 'bl'], [1, 1, 'br']].map(([x, y], i) => (
              <div key={i} style={{ position: 'absolute', [y ? 'bottom' : 'top']: 0, [x ? 'right' : 'left']: 0, width: 40, height: 40, borderTop: y ? 'none' : '4px solid #fff', borderBottom: y ? '4px solid #fff' : 'none', borderLeft: x ? 'none' : '4px solid #fff', borderRight: x ? '4px solid #fff' : 'none', borderRadius: `${!x && !y ? 16 : 0}px ${x && !y ? 16 : 0}px ${x && y ? 16 : 0}px ${!x && y ? 16 : 0}px` }} />
            ))}
            <div style={{ position: 'absolute', left: '6%', right: '6%', height: 3, background: T.brand, boxShadow: `0 0 14px 3px ${T.brand}`, borderRadius: 3, animation: 'scanLine 2.2s ease-in-out infinite' }} />
          </div>
          <div style={{ marginTop: 26, display: 'flex', alignItems: 'center', gap: 8, color: 'rgba(255,255,255,0.7)', fontSize: 13 }}>
            <window.Spinner size={18} color="#fff" /> QR aranıyor…
          </div>
        </div>
        <div style={{ display: 'flex', justifyContent: 'center', paddingBottom: 40, zIndex: 2 }}>
          <button onClick={() => app.showToast('Kamera çevrildi')} style={{ width: 54, height: 54, borderRadius: 999, background: 'rgba(255,255,255,0.16)', border: '1px solid rgba(255,255,255,0.25)', cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center', backdropFilter: 'blur(8px)' }}>
            <Icon name="cameraFlip" size={26} color="#fff" strokeWidth={2} />
          </button>
        </div>
      </div>
    );
  }

  // ── 2b. Short code ──────────────────────────────────────────
  function PayCode() {
    const app = window.useApp();
    const [c, setC] = React.useState('');
    return (
      <window.Screen padBottom={20}>
        <window.TopBar title="Kısa Kod ile Ödeme" onBack={app.back} brand />
        <div style={{ padding: '28px 18px 0' }}>
          <div style={{ textAlign: 'center', marginBottom: 30 }}>
            <div style={{ width: 64, height: 64, borderRadius: 20, background: hexA(T.purple, 0.13), display: 'flex', alignItems: 'center', justifyContent: 'center', margin: '0 auto 16px' }}><Icon name="keypad" size={30} color={T.purple} strokeWidth={1.9} /></div>
            <h2 style={{ margin: 0, fontSize: 22, fontWeight: 800, color: T.ink, letterSpacing: -0.5 }}>Kısa kodu girin</h2>
            <p style={{ margin: '8px 0 0', fontSize: 14.5, color: T.ink2 }}>POS ekranında görünen 6 haneli kod.</p>
          </div>
          <CodeInput value={c} onChange={setC} autoFocus />
        </div>
        <div style={{ padding: '28px 18px 0' }}>
          <Btn variant="coral" disabled={c.length < 6} onClick={() => app.go('paySelectCard')}>Devam Et</Btn>
        </div>
      </window.Screen>
    );
  }

  // ── 3. Select card ──────────────────────────────────────────
  function PaySelectCard() {
    const app = window.useApp();
    const [sel, setSel] = React.useState(app.activeCard || app.store.cards[0].id);
    return (
      <window.Screen padBottom={20}>
        <window.TopBar title="Kart Seçimi" onBack={app.back} brand />
        <div style={{ padding: '20px 18px 0' }}>
          <h2 style={{ margin: '0 0 4px', fontSize: 20, fontWeight: 800, color: T.ink, letterSpacing: -0.4 }}>Ödeme yapılacak kartı seçiniz</h2>
          <p style={{ margin: '0 0 20px', fontSize: 14, color: T.ink2, lineHeight: 1.5 }}>İşlem bilgileri seçtiğiniz karta göre getirilecektir.</p>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
            {app.store.cards.map((c, i) => <CardPick key={c.id} card={c} idx={i} selected={sel === c.id} onClick={() => setSel(c.id)} />)}
          </div>
        </div>
        <div style={{ padding: '24px 18px 0' }}>
          <Btn variant="coral" onClick={() => { app.setActiveCard(sel); app.go('payConfirm', { cardId: sel }); }}>Devam Et</Btn>
        </div>
      </window.Screen>
    );
  }

  // ── 4. Amount confirm ───────────────────────────────────────
  function PayConfirm({ cardId }) {
    const app = window.useApp();
    const card = app.cardById(cardId) || app.store.cards[0];
    const [wallet, setWallet] = React.useState('resto');
    const idx = app.store.cards.findIndex(c => c.id === card.id);
    const wallets = [
      { key: 'resto', label: 'RESTORAN', bal: card.w.resto, color: T.coral, icon: 'fork' },
      { key: 'market', label: 'MARKET', bal: card.w.market, color: T.blue, icon: 'basket' },
    ];
    const sel = wallets.find(w => w.key === wallet);
    const insufficient = sel.bal < TXN.amount;
    const pay = () => {
      if (insufficient) { app.go('payFail', { reason: 'insufficient' }); return; }
      app.update(s => {
        const c = s.cards.find(x => x.id === card.id); c.w[wallet] -= TXN.amount;
        s.tx.unshift({ id: 't' + Date.now(), cardId: card.id, type: wallet === 'resto' ? 'RESTOPAY' : 'GIFTPAY', kind: 'SATIŞ', wallet: sel.label, name: 'Köfteci Yusuf', amount: -TXN.amount, date: '10.06.2026', time: '12:42', approvalNo: '004' + Math.floor(800 + Math.random() * 99), merchant: TXN.merchant });
      });
      app.go('paySuccess', { cardId: card.id, wallet, amount: TXN.amount });
    };
    return (
      <window.Screen padBottom={20}>
        <div style={{ paddingTop: window.STATUS_H, background: T.brand, position: 'relative' }}>
          <div style={{ display: 'flex', alignItems: 'center', padding: '0 8px', height: 48 }}>
            <button onClick={app.back} style={{ background: 'none', border: 'none', cursor: 'pointer', padding: 8 }}><Icon name="back" size={24} color="#fff" strokeWidth={2.2} /></button>
            <div style={{ flex: 1, textAlign: 'center', fontSize: 17, fontWeight: 700, color: '#fff', marginRight: 40 }}>İşlem Bilgisi</div>
          </div>
          <div style={{ textAlign: 'center', color: '#fff', padding: '4px 0 26px' }}>
            <div style={{ fontSize: 13, opacity: 0.85, fontWeight: 600 }}>Ödenecek Tutar</div>
            <div style={{ fontSize: 46, fontWeight: 800, letterSpacing: -1.5, lineHeight: 1.1 }}>{fmt(TXN.amount)} ₺</div>
            <div style={{ display: 'inline-flex', alignItems: 'center', gap: 7, background: 'rgba(255,255,255,0.18)', padding: '6px 14px', borderRadius: 999, marginTop: 6, fontSize: 13, fontWeight: 600 }}>
              <Icon name="store" size={15} color="#fff" strokeWidth={2} /> {TXN.merchant} · {TXN.product}
            </div>
          </div>
        </div>
        <div style={{ padding: '20px 18px 0', marginTop: -14 }}>
          <CardPick card={card} idx={idx} selected onClick={() => app.back()} />
          <div style={{ fontSize: 13, fontWeight: 700, color: T.ink2, margin: '22px 4px 12px', letterSpacing: 0.2 }}>SEKTÖR / CÜZDAN SEÇİNİZ</div>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
            {wallets.map(w => {
              const active = wallet === w.key; const low = w.bal < TXN.amount;
              return (
                <button key={w.key} onClick={() => setWallet(w.key)} style={{
                  display: 'flex', alignItems: 'center', gap: 13, padding: 14, fontFamily: T.font, textAlign: 'left', cursor: 'pointer',
                  background: T.card, border: `2px solid ${active ? w.color : T.line}`, borderRadius: 14, opacity: 1,
                }}>
                  <div style={{ width: 22, height: 22, borderRadius: 999, border: `2px solid ${active ? w.color : T.line}`, display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>
                    {active && <div style={{ width: 11, height: 11, borderRadius: 999, background: w.color }} />}
                  </div>
                  <div style={{ width: 34, height: 34, borderRadius: 10, background: hexA(w.color, 0.14), display: 'flex', alignItems: 'center', justifyContent: 'center' }}><Icon name={w.icon} size={18} color={w.color} strokeWidth={2} /></div>
                  <div style={{ flex: 1 }}>
                    <div style={{ fontSize: 14.5, fontWeight: 700, color: T.ink }}>{w.label}</div>
                    <div style={{ fontSize: 12.5, color: low ? T.coralDark : T.ink2, marginTop: 1 }}>Kullanılabilir: {fmt(w.bal)} ₺ {low && '· Yetersiz'}</div>
                  </div>
                  <Icon name="info" size={18} color={T.ink3} />
                </button>
              );
            })}
          </div>
        </div>
        <div style={{ padding: '24px 18px 0' }}>
          <Btn variant="coral" onClick={pay}>ÖDE · {fmt(TXN.amount)} ₺</Btn>
        </div>
      </window.Screen>
    );
  }

  // ── 5. Success ──────────────────────────────────────────────
  function PaySuccess({ cardId, wallet, amount }) {
    const app = window.useApp();
    const card = app.cardById(cardId) || app.store.cards[0];
    const bal = wallet === 'resto' ? card.w.resto : card.w.market;
    return (
      <window.Screen padBottom={24} bg={T.bg}>
        <div style={{ position: 'relative', paddingTop: window.STATUS_H, background: `linear-gradient(160deg, ${T.green}, ${T.greenDark})`, paddingBottom: 44, borderRadius: '0 0 30px 30px', overflow: 'hidden' }}>
          <div style={{ position: 'absolute', bottom: -1, left: 0, right: 0, height: 30 }}>
            <svg width="100%" height="30" viewBox="0 0 390 30" preserveAspectRatio="none"><path d="M0 30 C 80 6, 160 6, 195 16 C 240 28, 320 6, 390 18 L 390 30 Z" fill={T.bg} /></svg>
          </div>
          <div style={{ textAlign: 'center', color: '#fff', position: 'relative' }}>
            <div style={{ width: 84, height: 84, borderRadius: 999, background: 'rgba(255,255,255,0.2)', display: 'flex', alignItems: 'center', justifyContent: 'center', margin: '8px auto 16px', animation: 'pop .5s cubic-bezier(.2,.9,.3,1.4)' }}>
              <div style={{ width: 60, height: 60, borderRadius: 999, background: '#fff', display: 'flex', alignItems: 'center', justifyContent: 'center' }}><Icon name="check" size={34} color={T.green} strokeWidth={3} /></div>
            </div>
            <h1 style={{ margin: 0, fontSize: 25, fontWeight: 800, letterSpacing: -0.5 }}>Ödeme Başarılı</h1>
            <p style={{ margin: '6px 0 0', fontSize: 14, opacity: 0.92 }}>İşleminiz başarıyla tamamlandı.</p>
          </div>
        </div>
        <div style={{ padding: '20px 18px 0' }}>
          <Receipt merchant={TXN.merchant} date="10.06.2026" time="12:42" type={wallet === 'resto' ? 'RESTOPAY' : 'GIFTPAY'} amount={amount} balance={bal} cardNo={window.maskNo(card.number)} />
          <div style={{ marginTop: 18 }}><Btn variant="navy" onClick={() => { app.reset(); }}>Tamam</Btn></div>
          <div style={{ height: 10 }} />
          <Btn variant="ghost" icon="share" onClick={() => app.showToast('Fiş paylaşıldı')}>Fişi Paylaş</Btn>
        </div>
      </window.Screen>
    );
  }

  // ── 6. Fail ─────────────────────────────────────────────────
  function PayFail({ reason }) {
    const app = window.useApp();
    return (
      <window.Screen>
        <window.TopBar title="" onBack={app.back} border={false} />
        <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', textAlign: 'center', padding: '20px 32px' }}>
          <div style={{ width: 96, height: 96, borderRadius: 999, background: hexA(T.coral, 0.12), display: 'flex', alignItems: 'center', justifyContent: 'center', marginBottom: 22, animation: 'pop .5s cubic-bezier(.2,.9,.3,1.4)' }}>
            <div style={{ width: 64, height: 64, borderRadius: 999, background: T.coral, display: 'flex', alignItems: 'center', justifyContent: 'center' }}><Icon name="close" size={34} color="#fff" strokeWidth={3} /></div>
          </div>
          <h1 style={{ margin: 0, fontSize: 24, fontWeight: 800, color: T.ink, letterSpacing: -0.5 }}>Ödeme Başarısız</h1>
          <p style={{ margin: '10px 0 0', fontSize: 15, color: T.ink2, lineHeight: 1.55, maxWidth: 280 }}>
            {reason === 'insufficient' ? 'Seçtiğiniz cüzdanda yeterli bakiye bulunmuyor. Lütfen farklı bir cüzdan seçin veya bakiye yükleyin.' : 'İşlem tamamlanamadı. Lütfen tekrar deneyin.'}
          </p>
          <div style={{ width: '100%', marginTop: 30 }}>
            <Btn variant="coral" icon="refresh" onClick={app.back}>Tekrar Dene</Btn>
            <div style={{ height: 10 }} />
            <Btn variant="ghost" onClick={() => app.reset()}>İptal Et</Btn>
          </div>
        </div>
      </window.Screen>
    );
  }

  Object.assign(window.SCREENS, {
    payChoose: { C: PayChoose, full: true },
    payQR: { C: PayQR, full: true, dark: true },
    payCode: { C: PayCode, full: true },
    paySelectCard: { C: PaySelectCard, full: true },
    payConfirm: { C: PayConfirm, full: true, dark: true },
    paySuccess: { C: PaySuccess, full: true, dark: true },
    payFail: { C: PayFail, full: true },
  });
})();

</script>

<script type="text/babel" data-file="screens-metropol-transfer.jsx">
// screens-metropol-transfer.jsx — Bakiye Transferi flow.
(function () {
  const { T, fmt, hexA, Btn, Field, Input, Panel, Row, Receipt } = window;
  const Icon = window.Icon;
  window.SCREENS = window.SCREENS || {};

  // ── bottom sheet picker ─────────────────────────────────────
  function Sheet({ title, open, onClose, children }) {
    if (!open) return null;
    return (
      <div style={{ position: 'absolute', inset: 0, zIndex: 50, display: 'flex', flexDirection: 'column', justifyContent: 'flex-end' }}>
        <div onClick={onClose} style={{ position: 'absolute', inset: 0, background: 'rgba(28,27,46,0.5)', animation: 'fadeBg .2s' }} />
        <div style={{ position: 'relative', background: T.bg, borderRadius: '26px 26px 0 0', padding: '14px 16px calc(env(safe-area-inset-bottom) + 26px)', animation: 'sheetUp .3s cubic-bezier(.2,.8,.3,1)', maxHeight: '74%', overflowY: 'auto' }}>
          <div style={{ width: 40, height: 5, borderRadius: 999, background: hexA(T.navy, 0.15), margin: '0 auto 14px' }} />
          <div style={{ fontSize: 17, fontWeight: 800, color: T.ink, textAlign: 'center', marginBottom: 14 }}>{title}</div>
          {children}
        </div>
      </div>
    );
  }

  function PickerField({ label, value, sub, icon, accent = T.brand, onClick }) {
    return (
      <Field label={label}>
        <button onClick={onClick} style={{ width: '100%', display: 'flex', alignItems: 'center', gap: 12, height: 60, padding: '0 14px', background: T.card, border: `1.5px solid ${T.line}`, borderRadius: 12, cursor: 'pointer', fontFamily: T.font, textAlign: 'left' }}>
          {icon && <div style={{ width: 38, height: 38, borderRadius: 11, background: hexA(accent, 0.13), display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}><Icon name={icon} size={20} color={accent} strokeWidth={2} /></div>}
          <div style={{ flex: 1, minWidth: 0 }}>
            <div style={{ fontSize: 14.5, fontWeight: 700, color: value ? T.ink : T.ink3, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{value || 'Seçiniz'}</div>
            {sub && <div style={{ fontSize: 12.5, color: T.ink2, marginTop: 1 }}>{sub}</div>}
          </div>
          <Icon name="chevronDown" size={18} color={T.ink3} strokeWidth={2} />
        </button>
      </Field>
    );
  }

  // ── transfer menu ───────────────────────────────────────────
  function TransferMenu() {
    const app = window.useApp();
    return (
      <window.Screen padBottom={28}>
        <window.TopBar title="Bakiye Transferi" onBack={app.back} brand />
        <div style={{ padding: '18px 18px 0' }}>
          <div style={{ fontSize: 13, fontWeight: 700, color: T.ink2, margin: '0 4px 10px', letterSpacing: 0.2 }}>GÖNDEREN</div>
          <Panel pad={0}>
            <Row icon="swap" iconBg={hexA(T.green, 0.14)} iconColor={T.green} title="Kartlarım Arası" sub="Kendi kartların arasında aktar" chevron onClick={() => app.go('transferBetween', { mode: 'self' })} />
            <Row icon="card" iconBg={hexA(T.blue, 0.14)} iconColor={T.blue} title="Başka Karta" sub="Kart numarası ile gönder" chevron onClick={() => app.go('transferBetween', { mode: 'other' })} />
            <Row icon="phone" iconBg={hexA(T.purple, 0.14)} iconColor={T.purple} title="Cep Numarasına" sub="Telefon numarasına bakiye gönder" chevron onClick={() => app.go('transferBetween', { mode: 'phone' })} />
            <Row icon="heart" iconBg={hexA(T.coral, 0.14)} iconColor={T.coral} title="Yardım Kartına" sub="Bağış ve yardım kartlarına" chevron last onClick={() => app.go('transferBetween', { mode: 'aid' })} />
          </Panel>

          <div style={{ fontSize: 13, fontWeight: 700, color: T.ink2, margin: '22px 4px 10px', letterSpacing: 0.2 }}>ALICI</div>
          <Panel pad={0}>
            <Row icon="users" iconBg={hexA(T.navy, 0.1)} iconColor={T.navy} title="Kayıtlı Alıcı" sub="Tanımlı alıcılarına hızlı gönder" chevron onClick={() => app.showToast('Kayıtlı alıcı bulunamadı')} />
            <Row icon="qr" iconBg={hexA(T.navy, 0.1)} iconColor={T.navy} title="QR Kod Alıcı" sub="Alıcının QR kodunu okut" chevron last onClick={() => app.go('transferQR')} />
          </Panel>

          <div style={{ fontSize: 13, fontWeight: 700, color: T.ink2, margin: '22px 4px 10px', letterSpacing: 0.2 }}>GEÇMİŞ TRANSFERLER</div>
          <Panel pad={0}>
            <Row icon="history" iconBg={hexA(T.purple, 0.14)} iconColor={T.purple} title="İşlem Geçmişi" sub="Tüm transfer hareketleri" chevron last onClick={() => app.go('history', { filter: 'TRANSFER' })} />
          </Panel>
        </div>
      </window.Screen>
    );
  }

  // ── between cards ───────────────────────────────────────────
  const QUICK = [500, 1000, 2500, 5000];
  function TransferBetween({ mode = 'self' }) {
    const app = window.useApp();
    const cards = app.store.cards;
    const [from, setFrom] = React.useState(cards[0].id);
    const [to, setTo] = React.useState(cards[1] ? cards[1].id : cards[0].id);
    const [wallet, setWallet] = React.useState('resto');
    const [amount, setAmount] = React.useState('');
    const [note, setNote] = React.useState('');
    const [sheet, setSheet] = React.useState(null);
    const fromCard = app.cardById(from); const toCard = app.cardById(to);
    const wLabel = { resto: 'RESTOPAY', market: 'MARKET', gift: 'GIFTPAY' }[wallet];
    const amt = parseFloat(amount) || 0;
    const valid = amt > 0 && (mode !== 'self' || from !== to);

    const title = { self: 'Kartlarım Arası', other: 'Başka Karta', phone: 'Cep Numarasına', aid: 'Yardım Kartına' }[mode];

    return (
      <React.Fragment>
        <window.Screen padBottom={24}>
          <window.TopBar title={title} onBack={app.back} brand />
          <div style={{ padding: '18px 18px 0', display: 'flex', flexDirection: 'column', gap: 16 }}>
            <PickerField label="Gönderen Kart" icon="card" accent={T.navy} value={fromCard.holder} sub={window.maskNo(fromCard.number)} onClick={() => setSheet('from')} />
            {mode === 'self'
              ? <PickerField label="Alıcı Kart" icon="card" accent={T.brand} value={toCard.holder} sub={window.maskNo(toCard.number)} onClick={() => setSheet('to')} />
              : <Field label={mode === 'phone' ? 'Alıcı Telefon' : 'Alıcı Kart Numarası'}><Input value={note === '__' ? '' : ''} onChange={() => { }} placeholder={mode === 'phone' ? '5XX XXX XX XX' : '6375 •••• •••• ••••'} icon={mode === 'phone' ? 'phone' : 'card'} inputMode="numeric" /></Field>}
            <PickerField label="Cüzdanlarım" icon="wallet" accent={T.coral} value={wLabel} sub={`Kullanılabilir: ${fmt(fromCard.w[wallet])} ₺`} onClick={() => setSheet('wallet')} />

            <div>
              <div style={{ fontSize: 13, fontWeight: 600, color: T.ink2, marginBottom: 7, marginLeft: 4 }}>Tutar</div>
              <div style={{ display: 'flex', gap: 8, marginBottom: 12 }}>
                {QUICK.map(q => (
                  <button key={q} onClick={() => setAmount(String(q))} style={{ flex: 1, height: 38, borderRadius: 999, border: `1.5px solid ${amt === q ? T.green : T.line}`, background: amt === q ? hexA(T.green, 0.1) : T.card, color: amt === q ? T.greenDark : T.ink, fontWeight: 700, fontSize: 13, cursor: 'pointer', fontFamily: T.font }}>{q} ₺</button>
                ))}
              </div>
              <Input value={amount} onChange={v => setAmount(v.replace(/[^\d.]/g, ''))} placeholder="0,00" prefix="₺" inputMode="decimal" align="right" big />
            </div>
            <Field label="Açıklama (İsteğe Bağlı)"><Input value={note} onChange={setNote} placeholder="Örn. Yemek bütçesi" /></Field>
          </div>
          <div style={{ padding: '22px 18px 0' }}>
            <Btn variant="green" icon="send" disabled={!valid} onClick={() => app.go('transferConfirm', { from, to, wallet, amount: amt, note, mode })}>Gönder</Btn>
          </div>
        </window.Screen>

        <Sheet title="Kart Seçin" open={sheet === 'from' || sheet === 'to'} onClose={() => setSheet(null)}>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
            {cards.map((c, i) => <window.CardPick key={c.id} card={c} idx={i} selected={(sheet === 'from' ? from : to) === c.id} onClick={() => { sheet === 'from' ? setFrom(c.id) : setTo(c.id); setSheet(null); }} />)}
          </div>
        </Sheet>
        <Sheet title="Cüzdan Seçin" open={sheet === 'wallet'} onClose={() => setSheet(null)}>
          <Panel pad={0}>
            {[['resto', 'RESTOPAY', T.coral, 'fork'], ['market', 'MARKET', T.blue, 'basket'], ['gift', 'GIFTPAY', '#E0883B', 'gift']].map(([k, l, c, ic], i, arr) => (
              <Row key={k} icon={ic} iconBg={hexA(c, 0.14)} iconColor={c} title={l} sub={`Kullanılabilir: ${fmt(fromCard.w[k])} ₺`} last={i === arr.length - 1}
                right={wallet === k ? <Icon name="check" size={20} color={T.green} strokeWidth={2.6} /> : null} onClick={() => { setWallet(k); setSheet(null); }} />
            ))}
          </Panel>
        </Sheet>
      </React.Fragment>
    );
  }

  // ── QR recipient ────────────────────────────────────────────
  function TransferQR() {
    const app = window.useApp();
    React.useEffect(() => { const t = setTimeout(() => app.go('transferBetween', { mode: 'other' }), 2400); return () => clearTimeout(t); }, []);
    return (
      <div style={{ position: 'absolute', inset: 0, background: '#0E0D1A' }}>
        <div style={{ position: 'absolute', inset: 0, background: 'radial-gradient(80% 60% at 50% 40%, #2a2740, #0E0D1A)' }} />
        <div style={{ position: 'relative', paddingTop: window.STATUS_H, background: T.green, paddingBottom: 14 }}>
          <div style={{ display: 'flex', alignItems: 'center', padding: '0 8px' }}>
            <button onClick={app.back} style={{ background: 'none', border: 'none', cursor: 'pointer', padding: 8 }}><Icon name="close" size={24} color="#fff" strokeWidth={2.4} /></button>
            <div style={{ flex: 1, textAlign: 'center', fontSize: 17, fontWeight: 700, color: '#fff', marginRight: 40 }}>Alıcı QR Kodu</div>
          </div>
        </div>
        <div style={{ position: 'absolute', inset: 0, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center' }}>
          <div style={{ color: 'rgba(255,255,255,0.9)', fontSize: 15, fontWeight: 600, marginBottom: 26, textAlign: 'center', padding: '0 40px' }}>Alıcının QR kodunu<br />çerçeveye hizalayın</div>
          <div style={{ position: 'relative', width: 224, height: 224, borderRadius: 24, border: '3px solid rgba(255,255,255,0.4)' }}>
            <div style={{ position: 'absolute', left: '6%', right: '6%', height: 3, background: T.green, boxShadow: `0 0 14px 3px ${T.green}`, borderRadius: 3, animation: 'scanLine 2.2s ease-in-out infinite' }} />
          </div>
          <div style={{ marginTop: 24, display: 'flex', alignItems: 'center', gap: 8, color: 'rgba(255,255,255,0.7)', fontSize: 13 }}><window.Spinner size={18} color="#fff" /> QR aranıyor…</div>
        </div>
      </div>
    );
  }

  // ── confirm ─────────────────────────────────────────────────
  function TransferConfirm({ from, to, wallet, amount, note, mode }) {
    const app = window.useApp();
    const fromCard = app.cardById(from); const toCard = app.cardById(to) || fromCard;
    const [save, setSave] = React.useState(false);
    const [saveName, setSaveName] = React.useState('');
    const wLabel = { resto: 'RESTOPAY', market: 'MARKET', gift: 'GIFTPAY' }[wallet];
    const recipName = mode === 'self' ? toCard.holder : 'M*** Y***';
    const recipNo = mode === 'self' ? window.maskNo(toCard.number) : '6375 •••• •••• 4418';
    const line = (k, v) => (
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '14px 0', borderBottom: `1px solid ${T.line2}` }}>
        <span style={{ fontSize: 13.5, color: T.ink2 }}>{k}</span>
        <span style={{ fontSize: 14.5, fontWeight: 700, color: T.ink, textAlign: 'right', maxWidth: 200 }}>{v}</span>
      </div>
    );
    const confirm = () => {
      app.update(s => {
        const f = s.cards.find(x => x.id === from); if (f) f.w[wallet] = Math.max(0, f.w[wallet] - amount);
        if (mode === 'self') { const t = s.cards.find(x => x.id === to); if (t) t.w[wallet] += amount; }
        s.tx.unshift({ id: 't' + Date.now(), cardId: from, type: wLabel, kind: 'TRANSFER', wallet: wLabel, name: recipName, amount: -amount, date: '10.06.2026', time: '12:50', approvalNo: '004' + Math.floor(800 + Math.random() * 99), merchant: 'Bakiye transferi' });
      });
      app.go('transferSuccess', { amount, wallet, from, recipName });
    };
    return (
      <window.Screen padBottom={24}>
        <window.TopBar title="İşlem Onayı" onBack={app.back} brand />
        <div style={{ padding: '20px 18px 0' }}>
          <div style={{ textAlign: 'center', marginBottom: 8 }}>
            <div style={{ fontSize: 13, color: T.ink2, fontWeight: 600 }}>Transfer Tutarı</div>
            <div style={{ fontSize: 40, fontWeight: 800, color: T.green, letterSpacing: -1.2, marginTop: 2 }}>{fmt(amount)} ₺</div>
          </div>
          <Panel style={{ marginTop: 12 }}>
            {line('Gönderen Kartım', `${fromCard.holder} · ${window.maskNo(fromCard.number)}`)}
            {line('Alıcı', recipName)}
            {line('Alıcı Numarası', recipNo)}
            {line('Cüzdan', wLabel)}
            {note && line('Açıklama', note)}
            <div style={{ display: 'flex', justifyContent: 'space-between', padding: '14px 0 0' }}><span style={{ fontSize: 13.5, color: T.ink2 }}>Tarih</span><span style={{ fontSize: 14.5, fontWeight: 700, color: T.ink }}>10.06.2026 · 12:50</span></div>
          </Panel>
          <button onClick={() => setSave(!save)} style={{ display: 'flex', gap: 11, alignItems: 'center', background: 'none', border: 'none', cursor: 'pointer', padding: '18px 4px 0', textAlign: 'left' }}>
            <div style={{ width: 22, height: 22, borderRadius: 7, flexShrink: 0, background: save ? T.green : 'transparent', border: `2px solid ${save ? T.green : T.line}`, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>{save && <Icon name="check" size={14} color="#fff" strokeWidth={3} />}</div>
            <span style={{ fontSize: 14, color: T.ink, fontWeight: 600 }}>Tanımlı alıcı olarak ekle</span>
          </button>
          {save && <div style={{ marginTop: 14 }}><Field label="Kayıt Adı"><Input value={saveName} onChange={setSaveName} placeholder="Örn. Eşim" icon="user" /></Field></div>}
        </div>
        <div style={{ padding: '24px 18px 0' }}>
          <Btn variant="green" icon="check" onClick={confirm}>Onayla</Btn>
        </div>
      </window.Screen>
    );
  }

  // ── success ─────────────────────────────────────────────────
  function TransferSuccess({ amount, wallet, from, recipName }) {
    const app = window.useApp();
    const card = app.cardById(from) || app.store.cards[0];
    const bal = card.w[wallet];
    return (
      <window.Screen padBottom={24}>
        <div style={{ position: 'relative', paddingTop: window.STATUS_H, background: `linear-gradient(160deg, ${T.green}, ${T.greenDark})`, paddingBottom: 44, borderRadius: '0 0 30px 30px', overflow: 'hidden' }}>
          <div style={{ position: 'absolute', bottom: -1, left: 0, right: 0, height: 30 }}>
            <svg width="100%" height="30" viewBox="0 0 390 30" preserveAspectRatio="none"><path d="M0 30 C 80 6, 160 6, 195 16 C 240 28, 320 6, 390 18 L 390 30 Z" fill={T.bg} /></svg>
          </div>
          <div style={{ textAlign: 'center', color: '#fff', position: 'relative' }}>
            <div style={{ width: 84, height: 84, borderRadius: 999, background: 'rgba(255,255,255,0.2)', display: 'flex', alignItems: 'center', justifyContent: 'center', margin: '8px auto 16px', animation: 'pop .5s cubic-bezier(.2,.9,.3,1.4)' }}>
              <div style={{ width: 60, height: 60, borderRadius: 999, background: '#fff', display: 'flex', alignItems: 'center', justifyContent: 'center' }}><Icon name="check" size={34} color={T.green} strokeWidth={3} /></div>
            </div>
            <h1 style={{ margin: 0, fontSize: 25, fontWeight: 800, letterSpacing: -0.5 }}>Transfer Başarılı</h1>
            <p style={{ margin: '6px 0 0', fontSize: 14, opacity: 0.92 }}>{fmt(amount)} ₺ başarıyla gönderildi.</p>
          </div>
        </div>
        <div style={{ padding: '20px 18px 0' }}>
          <Receipt merchant={recipName} date="10.06.2026" time="12:50" type={{ resto: 'RESTOPAY', market: 'MARKET', gift: 'GIFTPAY' }[wallet]} amount={amount} balance={bal} cardNo={window.maskNo(card.number)} label="TRANSFER İŞLEMİ BAŞARILI" />
          <div style={{ marginTop: 18 }}><Btn variant="navy" onClick={() => app.reset()}>Tamam</Btn></div>
        </div>
      </window.Screen>
    );
  }

  Object.assign(window.SCREENS, {
    transferMenu: { C: TransferMenu, full: true },
    transferBetween: { C: TransferBetween, full: true },
    transferQR: { C: TransferQR, full: true, dark: true },
    transferConfirm: { C: TransferConfirm, full: true },
    transferSuccess: { C: TransferSuccess, full: true, dark: true },
  });
  window.Sheet = Sheet; window.PickerField = PickerField;
})();

</script>

<script type="text/babel" data-file="screens-metropol-misc.jsx">
// screens-metropol-misc.jsx — Keşfet (map), store detail, transaction history.
(function () {
  const { T, fmt, hexA, Btn, Panel, Row, Segmented } = window;
  const Icon = window.Icon;
  window.SCREENS = window.SCREENS || {};

  const CAT = {
    resto: { color: T.coral, icon: 'fork', label: 'Restoran' },
    market: { color: T.blue, icon: 'basket', label: 'Market' },
    gift: { color: '#D267A8', icon: 'gift', label: 'Hediye' },
  };

  // faux map backdrop
  function MapBg({ small }) {
    return (
      <div style={{ position: 'absolute', inset: 0, background: '#E8EBE6', overflow: 'hidden' }}>
        <div style={{ position: 'absolute', inset: 0, background: 'radial-gradient(120% 100% at 30% 20%, #EEF1EA, #DDE3DB)' }} />
        {/* parks */}
        <div style={{ position: 'absolute', left: '8%', top: '12%', width: '34%', height: '26%', borderRadius: 20, background: hexA('#5FA37F', 0.22) }} />
        <div style={{ position: 'absolute', right: '6%', bottom: '20%', width: '30%', height: '24%', borderRadius: 18, background: hexA('#5FA37F', 0.18) }} />
        <div style={{ position: 'absolute', left: '52%', top: '8%', width: '20%', height: '18%', borderRadius: 14, background: hexA(T.blue, 0.13) }} />
        {/* roads */}
        {[['8%', '0', '6px', '100%', '0deg'], ['64%', '0', '5px', '100%', '0deg'], ['0', '34%', '100%', '7px', '0deg'], ['0', '70%', '100%', '5px', '0deg']].map((r, i) => (
          <div key={i} style={{ position: 'absolute', left: r[0], top: r[1], width: r[2], height: r[3], background: '#fff', opacity: 0.85 }} />
        ))}
        <div style={{ position: 'absolute', left: '-10%', top: '52%', width: '130%', height: '9px', background: '#FBE3A2', transform: 'rotate(-14deg)' }} />
      </div>
    );
  }
  function Pin({ s, active, onClick }) {
    const c = CAT[s.cat];
    return (
      <button onClick={onClick} style={{ position: 'absolute', left: `${s.x}%`, top: `${s.y}%`, transform: 'translate(-50%,-100%)', background: 'none', border: 'none', cursor: 'pointer', padding: 0, zIndex: active ? 10 : 2 }}>
        <div style={{ position: 'relative', filter: 'drop-shadow(0 4px 6px rgba(0,0,0,0.25))' }}>
          <div style={{ width: active ? 44 : 36, height: active ? 44 : 36, borderRadius: '50% 50% 50% 0', background: c.color, transform: 'rotate(-45deg)', display: 'flex', alignItems: 'center', justifyContent: 'center', transition: 'all .15s', border: '2px solid #fff' }}>
            <div style={{ transform: 'rotate(45deg)' }}><Icon name={c.icon} size={active ? 20 : 17} color="#fff" strokeWidth={2.2} /></div>
          </div>
        </div>
      </button>
    );
  }

  // ── Explore (map) ───────────────────────────────────────────
  function Explore() {
    const app = window.useApp();
    const [active, setActive] = React.useState(app.store.stores[0].id);
    const [listView, setListView] = React.useState(false);
    const stores = app.store.stores;
    const sel = stores.find(s => s.id === active);
    const railRef = React.useRef();

    const FilterBar = () => (
      <div style={{ position: 'absolute', top: window.STATUS_H + 4, left: 0, right: 0, zIndex: 20, padding: '0 12px' }}>
        <div style={{ display: 'flex', gap: 8, overflowX: 'auto', padding: '4px 0', scrollbarWidth: 'none' }}>
          {[['close', 'Temizle'], ['fork', 'Sektör'], ['pin', 'Adres'], ['globe', 'Online'], [listView ? 'map' : 'list', listView ? 'Harita' : 'Listele']].map(([ic, lb], i) => (
            <button key={i} onClick={() => { if (lb === 'Listele' || lb === 'Harita') setListView(!listView); }} style={{ display: 'flex', alignItems: 'center', gap: 6, padding: '9px 13px', borderRadius: 999, border: 'none', background: 'rgba(255,255,255,0.96)', boxShadow: T.shadowSm, cursor: 'pointer', fontFamily: T.font, fontSize: 13, fontWeight: 700, color: T.ink, whiteSpace: 'nowrap', flexShrink: 0 }}>
              <Icon name={ic} size={16} color={T.brand} strokeWidth={2} />{lb}
            </button>
          ))}
        </div>
        <div style={{ display: 'flex', gap: 8, marginTop: 8 }}>
          <div style={{ flex: 1, display: 'flex', alignItems: 'center', gap: 8, background: '#fff', borderRadius: 14, padding: '0 14px', height: 46, boxShadow: T.shadowSm }}>
            <Icon name="search" size={19} color={T.ink3} />
            <input placeholder="Üye noktalarımızı keşfedin" style={{ flex: 1, border: 'none', outline: 'none', fontSize: 14.5, fontFamily: T.font, color: T.ink, background: 'transparent' }} />
          </div>
          <button onClick={() => app.showToast('Aranıyor…')} style={{ width: 46, height: 46, borderRadius: 14, background: T.brand, border: 'none', cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center', boxShadow: T.shadowSm }}><Icon name="search" size={20} color="#fff" strokeWidth={2.2} /></button>
        </div>
      </div>
    );

    if (listView) {
      return (
        <window.Screen padBottom={120}>
          <window.TopBar title="Üye İş Yerleri" onBack={app.back} trailing={<button onClick={() => setListView(false)} style={{ background: 'none', border: 'none', cursor: 'pointer', padding: 8 }}><Icon name="map" size={22} color={T.brand} /></button>} />
          <div style={{ padding: 16, display: 'flex', flexDirection: 'column', gap: 12 }}>
            {stores.map(s => <StoreCard key={s.id} s={s} onClick={() => app.go('storeDetail', { id: s.id })} full />)}
          </div>
        </window.Screen>
      );
    }

    return (
      <div style={{ position: 'absolute', inset: 0 }}>
        <MapBg />
        <FilterBar />
        {/* locate */}
        <button onClick={() => app.showToast('Konumunuza gidiliyor')} style={{ position: 'absolute', left: 14, bottom: 220, zIndex: 15, width: 46, height: 46, borderRadius: 14, background: '#fff', border: 'none', boxShadow: T.shadow, cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
          <Icon name="locate" size={22} color={T.navy} strokeWidth={2} />
        </button>
        {/* back */}
        <button onClick={app.back} style={{ position: 'absolute', left: 14, top: window.STATUS_H - 40, zIndex: 25, width: 40, height: 40, borderRadius: 999, background: '#fff', border: 'none', boxShadow: T.shadowSm, cursor: 'pointer', display: 'none' }} />
        {stores.map(s => <Pin key={s.id} s={s} active={active === s.id} onClick={() => { setActive(s.id); }} />)}
        {/* my location dot */}
        <div style={{ position: 'absolute', left: '46%', top: '80%', width: 18, height: 18, borderRadius: 999, background: T.blue, border: '3px solid #fff', boxShadow: '0 0 0 6px rgba(61,139,212,0.25)', zIndex: 5 }} />
        {/* bottom rail */}
        <div ref={railRef} style={{ position: 'absolute', left: 0, right: 0, bottom: 110, zIndex: 14, display: 'flex', gap: 12, overflowX: 'auto', padding: '0 16px', scrollSnapType: 'x mandatory', scrollbarWidth: 'none' }}>
          {stores.map(s => (
            <div key={s.id} style={{ flex: '0 0 90%', scrollSnapAlign: 'center' }} onClick={() => setActive(s.id)}>
              <StoreCard s={s} highlight={active === s.id} onClick={() => app.go('storeDetail', { id: s.id })} />
            </div>
          ))}
        </div>
      </div>
    );
  }

  function StoreCard({ s, onClick, highlight, full }) {
    const c = CAT[s.cat];
    return (
      <div style={{ background: '#fff', borderRadius: 18, padding: 14, boxShadow: highlight ? `0 10px 24px ${hexA(c.color, 0.28)}` : T.shadow, border: highlight ? `1.5px solid ${c.color}` : '1.5px solid transparent', transition: 'all .15s' }}>
        <div style={{ display: 'flex', gap: 12 }}>
          <div style={{ width: 46, height: 46, borderRadius: 13, background: hexA(c.color, 0.14), display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}><Icon name={c.icon} size={24} color={c.color} strokeWidth={2} /></div>
          <div style={{ flex: 1, minWidth: 0 }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
              <span style={{ fontSize: 15.5, fontWeight: 800, color: T.ink, letterSpacing: -0.3, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{s.name}</span>
              <window.Badge color={c.color} style={{ flexShrink: 0, padding: '2px 8px' }}>{s.dist}</window.Badge>
            </div>
            <div style={{ fontSize: 12.5, color: T.ink2, marginTop: 3, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{s.addr}</div>
          </div>
        </div>
        <div style={{ display: 'flex', gap: 8, marginTop: 12 }}>
          <RailBtn icon="directions" label="Yol Tarifi" onClick={() => onClick()} primary />
          <RailBtn icon="phone" label="Ara" />
          <RailBtn icon="pin" label="Haritada" onClick={onClick} />
        </div>
      </div>
    );
  }
  function RailBtn({ icon, label, onClick, primary }) {
    return (
      <button onClick={onClick} style={{ flex: 1, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 6, height: 38, borderRadius: 10, border: 'none', cursor: 'pointer', fontFamily: T.font, fontSize: 12.5, fontWeight: 700, background: primary ? T.brand : hexA(T.navy, 0.06), color: primary ? '#fff' : T.navy }}>
        <Icon name={icon} size={16} color={primary ? '#fff' : T.navy} strokeWidth={2} />{label}
      </button>
    );
  }

  // ── Store detail ────────────────────────────────────────────
  function StoreDetail({ id }) {
    const app = window.useApp();
    const s = app.store.stores.find(x => x.id === id) || app.store.stores[0];
    const c = CAT[s.cat];
    return (
      <window.Screen padBottom={28}>
        <window.TopBar title={s.name} onBack={app.back} brand />
        <div style={{ position: 'relative', height: 180, margin: 0 }}>
          <MapBg small />
          <Pin s={{ ...s, x: 50, y: 62 }} active />
        </div>
        <div style={{ padding: '18px 18px 0' }}>
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 16 }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
              <div style={{ width: 44, height: 44, borderRadius: 13, background: hexA(c.color, 0.14), display: 'flex', alignItems: 'center', justifyContent: 'center' }}><Icon name={c.icon} size={23} color={c.color} strokeWidth={2} /></div>
              <div><div style={{ fontSize: 18, fontWeight: 800, color: T.ink }}>{s.name}</div><window.Badge color={c.color}>{c.label} · {s.dist}</window.Badge></div>
            </div>
            <Btn variant="navy" size="sm" full={false} icon="directions" style={{ background: T.blue, boxShadow: 'none' }} onClick={() => app.showToast('Yol tarifi açılıyor')}>Yol Tarifi</Btn>
          </div>
          <Panel pad={0}>
            <Row icon="phone" iconBg={hexA(T.green, 0.13)} iconColor={T.green} title="Telefon" sub={s.phone} />
            <Row icon="pin" iconBg={hexA(T.coral, 0.13)} iconColor={T.coral} title="Adres" sub={s.addr} last />
          </Panel>
          <div style={{ marginTop: 18 }}><Btn variant="outline" icon="chat" onClick={() => app.showToast('Geri bildirim formu açıldı')}>Geri Bildirim Gönder</Btn></div>
        </div>
      </window.Screen>
    );
  }

  // ── Transaction history ─────────────────────────────────────
  function History({ filter }) {
    const app = window.useApp();
    const [f, setF] = React.useState(filter || 'all');
    let tx = app.store.tx;
    if (f === 'in') tx = tx.filter(t => t.amount > 0);
    else if (f === 'out') tx = tx.filter(t => t.amount < 0);
    else if (f === 'TRANSFER') tx = tx.filter(t => t.kind === 'TRANSFER');
    // group by date
    const groups = {};
    tx.forEach(t => { (groups[t.date] = groups[t.date] || []).push(t); });
    return (
      <window.Screen padBottom={28}>
        <window.TopBar title="İşlem Geçmişi" onBack={app.back} brand trailing={<button onClick={() => app.showToast('Tarih aralığı seçildi')} style={{ background: 'none', border: 'none', cursor: 'pointer', padding: 8 }}><Icon name="calendar" size={21} color={T.brand} /></button>} />
        <div style={{ padding: '14px 18px 0' }}>
          <Segmented value={f === 'TRANSFER' ? 'all' : f} onChange={setF} options={[{ value: 'all', label: 'Tümü' }, { value: 'in', label: 'Gelen' }, { value: 'out', label: 'Giden' }]} />
        </div>
        <div style={{ padding: '8px 18px 0' }}>
          {Object.keys(groups).length === 0 && <window.Empty icon="history" title="İşlem bulunamadı" sub="Seçilen filtreye uygun hareket yok." />}
          {Object.entries(groups).map(([date, items]) => (
            <div key={date} style={{ marginTop: 16 }}>
              <div style={{ fontSize: 12.5, fontWeight: 700, color: T.ink2, margin: '0 4px 8px', letterSpacing: 0.2 }}>{date}</div>
              <Panel pad={0}>
                {items.map((t, i) => {
                  const pos = t.amount > 0;
                  const w = window.WALLETS.find(x => x.label === t.wallet) || window.WALLETS[1];
                  return (
                    <Row key={t.id} last={i === items.length - 1}
                      icon={t.kind === 'TRANSFER' ? 'transfer' : t.kind === 'YÜKLEME' ? 'arrowDown' : w.icon}
                      iconBg={hexA(pos ? T.green : w.color, 0.13)} iconColor={pos ? T.green : w.color}
                      title={`${t.type} · ${t.kind}`} sub={`${t.name} · Onay No: ${t.approvalNo}`}
                      right={<div style={{ textAlign: 'right' }}>
                        <div style={{ fontSize: 15.5, fontWeight: 800, color: pos ? T.green : T.ink, letterSpacing: -0.3 }}>{pos ? '+' : '−'}{fmt(Math.abs(t.amount))} ₺</div>
                        <div style={{ fontSize: 11.5, color: T.ink3, marginTop: 1 }}>{t.time}</div>
                      </div>} />
                  );
                })}
              </Panel>
            </div>
          ))}
        </div>
      </window.Screen>
    );
  }

  Object.assign(window.SCREENS, {
    explore: { C: Explore, full: true },
    storeDetail: { C: StoreDetail, full: true },
    history: { C: History, full: true },
  });
})();

</script>

<script type="text/babel" data-file="screens-chat.jsx">
// screens-chat.jsx — chat list, conversation, new AI assistant, new chat.
(function () {
  const { T, hexA, Btn, Field, Input, Panel, Row, Badge } = window;
  const Icon = window.Icon;
  window.SCREENS = window.SCREENS || {};

  function Avatar({ name, color, kind, size = 46 }) {
    const initials = name.split(' ').map(w => w[0]).slice(0, 2).join('');
    return (
      <div style={{ position: 'relative', flexShrink: 0 }}>
        <div style={{ width: size, height: size, borderRadius: 999, background: kind === 'ai' ? `linear-gradient(140deg, ${color}, ${hexA(color, 0.65)})` : hexA(color, 0.16), display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
          {kind === 'ai' ? <Icon name="sparkle" size={size * 0.5} color="#fff" /> : <span style={{ fontSize: size * 0.36, fontWeight: 800, color }}>{initials}</span>}
        </div>
        {kind === 'ai' && <div style={{ position: 'absolute', bottom: -2, right: -2, width: 18, height: 18, borderRadius: 999, background: '#fff', display: 'flex', alignItems: 'center', justifyContent: 'center', boxShadow: T.shadowSm }}><Icon name="star" size={10} color={color} fill={color} /></div>}
      </div>
    );
  }

  function ChatList() {
    const app = window.useApp();
    return (
      <window.Screen padBottom={120}>
        <div style={{ paddingTop: window.STATUS_H, background: T.card, borderBottom: `1px solid ${T.line2}`, position: 'relative', zIndex: 20 }}>
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '12px 18px 16px' }}>
            <h1 style={{ margin: 0, fontSize: 28, fontWeight: 800, color: T.ink, letterSpacing: -0.7 }}>Sohbet</h1>
            <button onClick={() => app.go('newChat')} style={{ width: 40, height: 40, borderRadius: 999, background: T.brandSoft, border: 'none', cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center' }}><Icon name="plus" size={22} color={T.brand} strokeWidth={2.2} /></button>

        </div>
        <div style={{ padding: 16 }}>
          <button onClick={() => app.go('newAI')} style={{ width: '100%', display: 'flex', alignItems: 'center', gap: 13, padding: 14, marginBottom: 14, borderRadius: 16, border: `1.5px dashed ${hexA(T.purple, 0.4)}`, background: hexA(T.purple, 0.05), cursor: 'pointer', fontFamily: T.font, textAlign: 'left' }}>
            <div style={{ width: 44, height: 44, borderRadius: 999, background: `linear-gradient(140deg, ${T.purple}, ${hexA(T.purple, 0.6)})`, display: 'flex', alignItems: 'center', justifyContent: 'center' }}><Icon name="sparkle" size={22} color="#fff" /></div>
            <div style={{ flex: 1 }}><div style={{ fontSize: 15, fontWeight: 700, color: T.ink }}>Yeni AI Asistan Oluştur</div><div style={{ fontSize: 12.5, color: T.ink2, marginTop: 1 }}>Kendi yapay zeka asistanını tasarla</div></div>
            <Icon name="chevron" size={18} color={T.ink3} strokeWidth={2} />
          </button>
          <Panel pad={0}>
            {app.store.chats.map((c, i, arr) => (
              <div key={c.id} onClick={() => app.go('chat', { id: c.id })} style={{ display: 'flex', alignItems: 'center', gap: 13, padding: '13px 16px', cursor: 'pointer', borderBottom: i === arr.length - 1 ? 'none' : `1px solid ${T.line2}` }}>
                <Avatar name={c.name} color={c.avatar} kind={c.kind} />
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
                    <span style={{ fontSize: 15.5, fontWeight: 700, color: T.ink, letterSpacing: -0.2 }}>{c.name}</span>
                    {c.kind === 'ai' && <Badge color={T.purple} style={{ padding: '1px 6px', fontSize: 9.5 }}>AI</Badge>}
                  </div>
                  <div style={{ fontSize: 13.5, color: c.unread ? T.ink : T.ink2, fontWeight: c.unread ? 600 : 400, marginTop: 2, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{c.last}</div>
                </div>
                <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'flex-end', gap: 5 }}>
                  <span style={{ fontSize: 12, color: c.unread ? T.brand : T.ink3, fontWeight: c.unread ? 700 : 500 }}>{c.time}</span>
                  {c.unread > 0 && <span style={{ minWidth: 18, height: 18, padding: '0 5px', borderRadius: 999, background: T.brand, color: '#fff', fontSize: 11, fontWeight: 800, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>{c.unread}</span>}
                </div>
              </div>
            ))}
          </Panel>
        </div>
      </window.Screen>
    );
  }

  function Chat({ id }) {
    const app = window.useApp();
    const chat = app.store.chats.find(c => c.id === id) || app.store.chats[0];
    const [msgs, setMsgs] = React.useState(chat.messages);
    const [text, setText] = React.useState('');
    const [typing, setTyping] = React.useState(false);
    const bodyRef = React.useRef();
    React.useEffect(() => { app.update(s => { const c = s.chats.find(x => x.id === id); if (c) c.unread = 0; }); }, []);
    React.useEffect(() => { if (bodyRef.current) bodyRef.current.scrollTop = bodyRef.current.scrollHeight; }, [msgs, typing]);
    const send = () => {
      if (!text.trim()) return;
      const t = text.trim(); setText('');
      setMsgs(m => [...m, { from: 'me', text: t, time: '12:55' }]);
      if (chat.kind === 'ai') {
        setTyping(true);
        setTimeout(() => { setTyping(false); setMsgs(m => [...m, { from: 'them', text: 'Anladım! Bunu senin için hallediyorum ✨ Birkaç saniye içinde hazır olacak.', time: '12:55' }]); }, 1600);
      }
    };
    return (
      <div style={{ position: 'absolute', inset: 0, display: 'flex', flexDirection: 'column', background: T.bg }}>
        {/* header */}
        <div style={{ paddingTop: window.STATUS_H, background: T.card, borderBottom: `1px solid ${T.line2}`, zIndex: 5 }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '8px 12px' }}>
            <button onClick={app.back} style={{ background: 'none', border: 'none', cursor: 'pointer', padding: 6 }}><Icon name="back" size={24} color={T.ink} strokeWidth={2.2} /></button>
            <Avatar name={chat.name} color={chat.avatar} kind={chat.kind} size={38} />
            <div style={{ flex: 1, minWidth: 0 }}>
              <div style={{ fontSize: 15.5, fontWeight: 700, color: T.ink }}>{chat.name}</div>
              <div style={{ fontSize: 12, color: chat.online ? T.green : T.ink3, fontWeight: 600, display: 'flex', alignItems: 'center', gap: 5 }}>{chat.online && <span style={{ width: 6, height: 6, borderRadius: 999, background: T.green }} />}{chat.kind === 'ai' ? 'Yapay Zeka Asistanı' : chat.online ? 'Çevrimiçi' : 'Çevrimdışı'}</div>
            </div>
          </div>
        </div>
        {/* body */}
        <div ref={bodyRef} style={{ flex: 1, minHeight: 0, overflowY: 'auto', padding: '16px 14px', display: 'flex', flexDirection: 'column', gap: 10 }}>
          {msgs.map((m, i) => (
            <div key={i} style={{ display: 'flex', justifyContent: m.from === 'me' ? 'flex-end' : 'flex-start' }}>
              <div style={{ maxWidth: '76%', padding: '11px 14px', borderRadius: m.from === 'me' ? '18px 18px 5px 18px' : '18px 18px 18px 5px', background: m.from === 'me' ? T.brand : T.card, color: m.from === 'me' ? '#fff' : T.ink, fontSize: 14.5, lineHeight: 1.45, boxShadow: m.from === 'me' ? 'none' : T.shadowSm, fontWeight: 450 }}>
                {m.text}
                <div style={{ fontSize: 10.5, opacity: 0.6, marginTop: 4, textAlign: 'right' }}>{m.time}</div>
              </div>
            </div>
          ))}
          {typing && (
            <div style={{ display: 'flex', justifyContent: 'flex-start' }}>
              <div style={{ padding: '13px 16px', borderRadius: '18px 18px 18px 5px', background: T.card, boxShadow: T.shadowSm, display: 'flex', gap: 5, alignItems: 'center' }}>
                {[0, 1, 2].map(d => <span key={d} style={{ width: 7, height: 7, borderRadius: 999, background: T.ink3, animation: `typingDot 1.2s ${d * 0.2}s infinite` }} />)}
              </div>
            </div>
          )}
        </div>
        {/* input */}
        <div style={{ padding: '10px 12px calc(env(safe-area-inset-bottom) + 14px)', background: T.card, borderTop: `1px solid ${T.line2}`, display: 'flex', gap: 10, alignItems: 'center' }}>
          <div style={{ flex: 1, display: 'flex', alignItems: 'center', background: T.bg, borderRadius: 999, padding: '0 16px', height: 46 }}>
            <input value={text} onChange={e => setText(e.target.value)} onKeyDown={e => e.key === 'Enter' && send()} placeholder="Mesaj yazın…" style={{ flex: 1, border: 'none', outline: 'none', background: 'transparent', fontSize: 15, fontFamily: T.font, color: T.ink }} />
          </div>
          <button onClick={send} style={{ width: 46, height: 46, borderRadius: 999, background: text.trim() ? T.brand : hexA(T.navy, 0.12), border: 'none', cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center', transition: 'background .15s', flexShrink: 0 }}>
            <Icon name="send" size={21} color={text.trim() ? '#fff' : T.ink3} strokeWidth={2} />
          </button>
        </div>
      </div>
    );
  }

  // ── New AI assistant ────────────────────────────────────────
  const PERSONAS = [
    { id: 'helper', name: 'Yardımsever', color: '#7C5CBF', icon: 'sparkle' },
    { id: 'finance', name: 'Finans', color: '#5FA37F', icon: 'coins' },
    { id: 'hr', name: 'İK', color: '#3D8BD4', icon: 'briefcase' },
    { id: 'fun', name: 'Enerjik', color: '#F2697B', icon: 'bolt' },
  ];
  function NewAI() {
    const app = window.useApp();
    const [name, setName] = React.useState('');
    const [persona, setPersona] = React.useState('helper');
    const [desc, setDesc] = React.useState('');
    const p = PERSONAS.find(x => x.id === persona);
    const create = () => {
      const id = 'ch' + Date.now();
      app.update(s => s.chats.unshift({ id, name: name || 'Yeni Asistan', kind: 'ai', avatar: p.color, last: 'Merhaba! Sana nasıl yardımcı olabilirim?', time: 'Şimdi', unread: 0, online: true, messages: [{ from: 'them', text: `Merhaba, ben ${name || 'asistanın'}! ${desc || 'Sana yardımcı olmak için buradayım.'} ✨`, time: 'Şimdi' }] }));
      app.back(); app.showToast('AI asistan oluşturuldu 🎉');
    };
    return (
      <window.Screen padBottom={20}>
        <window.TopBar title="Yeni AI Asistan" onBack={app.back} brand />
        <div style={{ padding: '20px 18px 0' }}>
          <div style={{ display: 'flex', justifyContent: 'center', marginBottom: 24 }}>
            <div style={{ width: 84, height: 84, borderRadius: 999, background: `linear-gradient(140deg, ${p.color}, ${hexA(p.color, 0.6)})`, display: 'flex', alignItems: 'center', justifyContent: 'center', boxShadow: `0 12px 28px ${hexA(p.color, 0.35)}` }}><Icon name={p.icon} size={40} color="#fff" /></div>
          </div>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 18 }}>
            <Field label="Asistan Adı"><Input value={name} onChange={setName} placeholder="Örn. Bütçe Botu" icon="sparkle" /></Field>
            <div>
              <div style={{ fontSize: 13, fontWeight: 600, color: T.ink2, marginBottom: 10, marginLeft: 4 }}>Kişilik & Avatar</div>
              <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10 }}>
                {PERSONAS.map(x => (
                  <button key={x.id} onClick={() => setPersona(x.id)} style={{ display: 'flex', alignItems: 'center', gap: 10, padding: 12, borderRadius: 14, border: `2px solid ${persona === x.id ? x.color : T.line}`, background: persona === x.id ? hexA(x.color, 0.07) : T.card, cursor: 'pointer', fontFamily: T.font }}>
                    <div style={{ width: 34, height: 34, borderRadius: 999, background: hexA(x.color, 0.16), display: 'flex', alignItems: 'center', justifyContent: 'center' }}><Icon name={x.icon} size={18} color={x.color} /></div>
                    <span style={{ fontSize: 14, fontWeight: 700, color: T.ink }}>{x.name}</span>
                  </button>
                ))}
              </div>
            </div>
            <Field label="Kısa Açıklama"><Input value={desc} onChange={setDesc} placeholder="Bu asistan ne yapacak?" /></Field>
          </div>
        </div>
        <div style={{ padding: '24px 18px 0' }}><Btn variant="navy" icon="sparkle" disabled={!name} onClick={create} style={{ background: T.purple, boxShadow: `0 8px 20px ${hexA(T.purple, 0.3)}` }}>Oluştur</Btn></div>
      </window.Screen>
    );
  }

  function NewChat() {
    const app = window.useApp();
    const [q, setQ] = React.useState('');
    const list = app.store.colleagues.filter(c => c.name.toLowerCase().includes(q.toLowerCase()));
    return (
      <window.Screen padBottom={20}>
        <window.TopBar title="Yeni Sohbet" onBack={app.back} brand />
        <div style={{ padding: '16px 18px 0' }}>
          <Input value={q} onChange={setQ} placeholder="Kişi ara…" icon="search" />
          <div style={{ fontSize: 13, fontWeight: 700, color: T.ink2, margin: '20px 4px 10px', letterSpacing: 0.2 }}>FİRMA ÇALIŞANLARI</div>
          <Panel pad={0}>
            {list.length ? list.map((c, i) => (
              <Row key={c.id} icon={<div style={{ width: 40, height: 40, borderRadius: 999, background: hexA(c.avatar, 0.16), display: 'flex', alignItems: 'center', justifyContent: 'center' }}><span style={{ fontSize: 15, fontWeight: 800, color: c.avatar }}>{c.name.split(' ').map(w => w[0]).join('')}</span></div>}
                title={c.name} sub={c.title} last={i === list.length - 1} onClick={() => { app.showToast(`${c.name} ile sohbet başlatıldı`); app.back(); }} />
            )) : <window.Empty icon="users" title="Kişi bulunamadı" />}
          </Panel>
        </div>
      </window.Screen>
    );
  }

  Object.assign(window.SCREENS, {
    chatList: { C: ChatList },
    chat: { C: Chat, full: true },
    newAI: { C: NewAI, full: true },
    newChat: { C: NewChat, full: true },
  });
})();

</script>

<script type="text/babel" data-file="screens-other.jsx">

  // mini calendar sheet

      { id: 'leave', title: 'İzin Talebi', sub: 'İzin oluştur & takip et', icon: 'calendar', accent: T.blue, go: 'leave' },
      { id: 'expense', title: 'Masraf Talebi', sub: 'Harcama girişi', icon: 'receipt', accent: T.green, go: 'expense' },
      ...(isManager ? [{ id: 'approve', title: 'Masraf Onay', sub: 'Onay bekleyenler', icon: 'check', accent: T.coral, go: 'expenseApprove', badge: app.store.approvals.length }] : []),

                <div style={{ width: 48, height: 48, borderRadius: 15, background: hexA(m.accent, 0.13), display: 'flex', alignItems: 'center', justifyContent: 'center' }}><Icon name={m.icon} size={25} color={m.accent} strokeWidth={1.9} /></div>

          </div>
        </div>
      </window.Screen>
    );
  }

  // ── Leave request ───────────────────────────────────────────
  function Leave() {
    const app = window.useApp();
    const [type, setType] = React.useState('Yıllık İzin');
    const [start, setStart] = React.useState('');
    const [end, setEnd] = React.useState('');
    const [desc, setDesc] = React.useState('');
    const [sheet, setSheet] = React.useState(null);
    const days = (start && end) ? Math.max(1, (parseInt(end) - parseInt(start)) + 1) : (start ? 1 : 0);
    const submit = () => {
      app.update(s => s.leaveRequests.unshift({ id: 'l' + Date.now(), type, start, end: end || start, days: days || 1, status: 'Beklemede' }));
      setStart(''); setEnd(''); setDesc(''); app.showToast('İzin talebi gönderildi');
    };
    return (
      <React.Fragment>
        <window.Screen padBottom={28}>
          <window.TopBar title="İzin Talebi" onBack={app.back} brand />

          </div>
          <div style={{ padding: '26px 18px 0' }}>
            <div style={{ fontSize: 13, fontWeight: 700, color: T.ink2, margin: '0 4px 10px', letterSpacing: 0.2 }}>GEÇMİŞ TALEPLER</div>
            <Panel pad={0}>
              {app.store.leaveRequests.map((r, i, arr) => (
                <Row key={r.id} icon="calendar" iconBg={hexA(T.blue, 0.13)} iconColor={T.blue} title={r.type} sub={`${r.start} – ${r.end} · ${r.days} gün`} right={<StatusBadge s={r.status} />} last={i === arr.length - 1} />

        <window.Sheet title="İzin Tipi" open={sheet === 'type'} onClose={() => setSheet(null)}>
          <Panel pad={0}>
            {['Yıllık İzin', 'Mazeret İzni', 'Hastalık İzni', 'Ücretsiz İzin'].map((t, i, a) => (

        <CalendarSheet open={sheet === 'start'} value={start} onPick={setStart} onClose={() => setSheet(null)} />
        <CalendarSheet open={sheet === 'end'} value={end} onPick={setEnd} onClose={() => setSheet(null)} />
      </React.Fragment>
    );
  }

    const [type, setType] = React.useState('Ulaşım');
    const [amount, setAmount] = React.useState('');
    const [date, setDate] = React.useState('');

      app.update(s => s.expenseRequests.unshift({ id: 'e' + Date.now(), type, amount: parseFloat(amount) || 0, date: date || '10.06.2026', status: 'Beklemede' }));

    };
    return (
      <React.Fragment>
        <window.Screen padBottom={28}>
          <window.TopBar title="Masraf Talebi" onBack={app.back} brand />
          <div style={{ padding: '18px 18px 0', display: 'flex', flexDirection: 'column', gap: 16 }}>
            <window.PickerField label="Masraf Tipi" icon="receipt" accent={T.green} value={type} onClick={() => setSheet('type')} />

        </window.Sheet>

      </React.Fragment>
    );
  }

  // ── Expense approval (manager) ──────────────────────────────
  function ExpenseApprove() {
    const app = window.useApp();
    const items = app.store.approvals;
    const act = (id, ok) => { app.update(s => s.approvals = s.approvals.filter(x => x.id !== id)); app.showToast(ok ? 'Masraf onaylandı' : 'Masraf reddedildi', ok ? 'ok' : 'err'); };

                </div>
              </Panel>
            ))}
          </div>}
      </window.Screen>
    );
  }

  Object.assign(window.SCREENS, {
    other: { C: Other },
    leave: { C: Leave, full: true },
    expense: { C: Expense, full: true },
    expenseApprove: { C: ExpenseApprove, full: true },

})();

</script>

    cardSettings: { C: CardSettings, full: true },
    language: { C: Language, full: true },

    blue: { brand: '#2F7DD6', brandDark: '#2367B8', brandSoft: '#EAF2FC', name: 'Atlas Enerji' },
    green: { brand: '#2E9E6B', brandDark: '#248255', brandSoft: '#E7F5EE', name: 'Vera Sağlık' },
    purple: { brand: '#6E54C8', brandDark: '#5B43AD', brandSoft: '#EFEBFA', name: 'Lumen Teknoloji' },
  };
  window.PALETTES = PALETTES;

  function Stub({ name }) {
    const app = window.useApp();
    return (
      <window.Screen>
        <window.TopBar title="Yakında" onBack={app.depth ? app.back : undefined} />
        <window.Empty icon="bolt" title="Bu ekran hazırlanıyor" sub={`"${name}" ekranı bu önizlemede henüz bağlı değil.`} />
      </window.Screen>
    );
  }

  function AnimatedScreen({ animKey, anim, children }) {
    const [run, setRun] = React.useState(true);
    React.useEffect(() => {
      setRun(true);
      const t = setTimeout(() => setRun(false), 420);
      return () => clearTimeout(t);
    }, [animKey]);
    return (
      <div style={{ position: 'absolute', inset: 0, display: 'flex', flexDirection: 'column', background: T.bg, animation: run ? `${anim} .32s cubic-bezier(.3,.8,.35,1)` : 'none' }}>
        {children}
      </div>
    );
  }

  function ScreenHost() {
    const app = window.useApp();
    const TABS = window.TABS;
    const rootName = TABS.find(t => t.id === app.tab).root;
    const top = app.stack[app.stack.length - 1];
    const name = top ? top.name : rootName;
    const props = top ? top.props : {};
    const reg = (window.SCREENS && window.SCREENS[name]) || null;
    const C = reg ? reg.C : null;
    const full = reg ? reg.full : false;

    const anim = app.dir === 'fwd' ? 'pushIn' : app.dir === 'back' ? 'popIn' : 'fadeIn';
    const key = `${app.tab}:${app.stack.length}:${name}`;

    return (
      <React.Fragment>
        <AnimatedScreen key={key} animKey={key} anim={anim}>
          {C ? <C {...props} /> : <Stub name={name} />}
        </AnimatedScreen>
        {!full && <window.TabBar />}
      </React.Fragment>
    );
  }

  function App() {
    const app = window.useApp();
    // apply brand palette before children read T.*
    const pal = PALETTES[app.store.brandKey || 'coral'];
    T.brand = pal.brand; T.brandDark = pal.brandDark; T.brandSoft = pal.brandSoft;

    const [scale, setScale] = React.useState(1);
    React.useEffect(() => {
      const fit = () => {
        const s = Math.min((window.innerHeight - 36) / 844, (window.innerWidth - 24) / 390, 1.15);
        setScale(s);
      };
      fit(); window.addEventListener('resize', fit);
      return () => window.removeEventListener('resize', fit);
    }, []);

    const TABS = window.TABS;
    const rootName = TABS.find(t => t.id === app.tab).root;
    const top = app.stack[app.stack.length - 1];
    const curName = top ? top.name : rootName;
    const curReg = (window.SCREENS && window.SCREENS[curName]) || null;
    const statusDark = app.authed && curReg ? !!curReg.dark : false;

    return (
      <div style={{ minHeight: '100vh', width: '100%', display: 'flex', alignItems: 'center', justifyContent: 'center', background: '#E7E7EC', padding: 12, boxSizing: 'border-box' }}>
        <window.Phone scale={scale} statusDark={!!statusDark}>
          {!app.authed
            ? <window.AuthHost />
            : <ScreenHost />}
          <window.Toast />
          {app.authed && window.AccountDrawer && <window.AccountDrawer />}
        </window.Phone>
      </div>
    );
  }

  function Root() {
    return (
      <window.NavProvider>
        <App />
      </window.NavProvider>
    );
  }

  window.MetropolApp = Root;
})();

</script>

<script type="text/babel">
  const root = ReactDOM.createRoot(document.getElementById('root'));
  root.render(React.createElement(window.MetropolApp));
</script>
</body>
</html>
