<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>Metropol Kart — Kurumsal Uygulama</title>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; background: #E7E7EC; -webkit-font-smoothing: antialiased; }
  #root { min-height: 100%; }
  button { font-family: inherit; }
  ::-webkit-scrollbar { width: 0; height: 0; }
  input { font-size: 16px; }
  @keyframes mspin { to { transform: rotate(360deg); } }
  @keyframes toastIn { from { transform: translateY(-16px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  @keyframes pushIn { from { transform: translateX(44px); opacity: .55; } to { transform: translateX(0); opacity: 1; } }
  @keyframes popIn { from { transform: translateX(-34px); opacity: .55; } to { transform: translateX(0); opacity: 1; } }
  @keyframes fadeIn { from { opacity: .45; transform: scale(0.992); } to { opacity: 1; transform: scale(1); } }
  @keyframes sheetUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  @keyframes fadeBg { from { opacity: 0; } to { opacity: 1; } }
  @keyframes pop { 0% { transform: scale(0); } 60% { transform: scale(1.15); } 100% { transform: scale(1); } }
  @keyframes typingDot { 0%,60%,100% { opacity: .3; transform: translateY(0); } 30% { opacity: 1; transform: translateY(-3px); } }
  @keyframes scanLine { 0% { top: 6%; } 50% { top: 92%; } 100% { top: 6%; } }
  @media (prefers-reduced-motion: reduce) { * { animation-duration: 0.001ms !important; } }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" data-file="ios-frame.jsx">
// @ds-adherence-ignore -- omelette starter scaffold (raw elements/hex/px by design)

/* BEGIN USAGE */
// iOS.jsx — Simplified iOS 26 (Liquid Glass) device frame
// Based on the iOS 26 UI Kit + Figma status bar spec. No assets, no deps.
// Exports (to window): IOSDevice, IOSStatusBar, IOSNavBar, IOSGlassPill, IOSList, IOSListRow, IOSKeyboard
//
// Usage — wrap your screen content in <IOSDevice> to get the bezel, status bar
// and home indicator (props: title, dark, keyboard):
//
//   <IOSDevice title="Settings">
//     ...your screen content...
//   </IOSDevice>
//   <IOSDevice dark title="Search" keyboard>…</IOSDevice>
/* END USAGE */

// ─────────────────────────────────────────────────────────────
// Status bar
// ─────────────────────────────────────────────────────────────
function IOSStatusBar({ dark = false, time = '9:41' }) {
  const c = dark ? '#fff' : '#000';
  return (
    <div style={{
      display: 'flex', gap: 154, alignItems: 'center', justifyContent: 'center',
      padding: '21px 24px 19px', boxSizing: 'border-box',
      position: 'relative', zIndex: 20, width: '100%',
    }}>
      <div style={{ flex: 1, height: 22, display: 'flex', alignItems: 'center', justifyContent: 'center', paddingTop: 1.5 }}>
        <span style={{
          fontFamily: '-apple-system, "SF Pro", system-ui', fontWeight: 590,
          fontSize: 17, lineHeight: '22px', color: c,
        }}>{time}</span>
      </div>
      <div style={{ flex: 1, height: 22, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 7, paddingTop: 1, paddingRight: 1 }}>
        <svg width="19" height="12" viewBox="0 0 19 12">
          <rect x="0" y="7.5" width="3.2" height="4.5" rx="0.7" fill={c}/>
          <rect x="4.8" y="5" width="3.2" height="7" rx="0.7" fill={c}/>
          <rect x="9.6" y="2.5" width="3.2" height="9.5" rx="0.7" fill={c}/>
          <rect x="14.4" y="0" width="3.2" height="12" rx="0.7" fill={c}/>
        </svg>
        <svg width="17" height="12" viewBox="0 0 17 12">
          <path d="M8.5 3.2C10.8 3.2 12.9 4.1 14.4 5.6L15.5 4.5C13.7 2.7 11.2 1.5 8.5 1.5C5.8 1.5 3.3 2.7 1.5 4.5L2.6 5.6C4.1 4.1 6.2 3.2 8.5 3.2Z" fill={c}/>
          <path d="M8.5 6.8C9.9 6.8 11.1 7.3 12 8.2L13.1 7.1C11.8 5.9 10.2 5.1 8.5 5.1C6.8 5.1 5.2 5.9 3.9 7.1L5 8.2C5.9 7.3 7.1 6.8 8.5 6.8Z" fill={c}/>
          <circle cx="8.5" cy="10.5" r="1.5" fill={c}/>
        </svg>
        <svg width="27" height="13" viewBox="0 0 27 13">
          <rect x="0.5" y="0.5" width="23" height="12" rx="3.5" stroke={c} strokeOpacity="0.35" fill="none"/>
          <rect x="2" y="2" width="20" height="9" rx="2" fill={c}/>
          <path d="M25 4.5V8.5C25.8 8.2 26.5 7.2 26.5 6.5C26.5 5.8 25.8 4.8 25 4.5Z" fill={c} fillOpacity="0.4"/>
        </svg>
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Liquid glass pill — blur + tint + shine
// ─────────────────────────────────────────────────────────────
function IOSGlassPill({ children, dark = false, style = {} }) {
  return (
    <div style={{
      height: 44, minWidth: 44, borderRadius: 9999,
      position: 'relative', overflow: 'hidden',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      boxShadow: dark
        ? '0 2px 6px rgba(0,0,0,0.35), 0 6px 16px rgba(0,0,0,0.2)'
        : '0 1px 3px rgba(0,0,0,0.07), 0 3px 10px rgba(0,0,0,0.06)',
      ...style,
    }}>
      {/* blur + tint */}
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 9999,
        backdropFilter: 'blur(12px) saturate(180%)',
        WebkitBackdropFilter: 'blur(12px) saturate(180%)',
        background: dark ? 'rgba(120,120,128,0.28)' : 'rgba(255,255,255,0.5)',
      }} />
      {/* shine */}
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 9999,
        boxShadow: dark
          ? 'inset 1.5px 1.5px 1px rgba(255,255,255,0.15), inset -1px -1px 1px rgba(255,255,255,0.08)'
          : 'inset 1.5px 1.5px 1px rgba(255,255,255,0.7), inset -1px -1px 1px rgba(255,255,255,0.4)',
        border: dark ? '0.5px solid rgba(255,255,255,0.15)' : '0.5px solid rgba(0,0,0,0.06)',
      }} />
      <div style={{ position: 'relative', zIndex: 1, display: 'flex', alignItems: 'center', padding: '0 4px' }}>
        {children}
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Navigation bar — glass pills + large title
// ─────────────────────────────────────────────────────────────
function IOSNavBar({ title = 'Title', dark = false, trailingIcon = true }) {
  const muted = dark ? 'rgba(255,255,255,0.6)' : '#404040';
  const text = dark ? '#fff' : '#000';
  const pillIcon = (content) => (
    <IOSGlassPill dark={dark}>
      <div style={{ width: 36, height: 36, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
        {content}
      </div>
    </IOSGlassPill>
  );
  return (
    <div style={{
      display: 'flex', flexDirection: 'column', gap: 10,
      paddingTop: 62, paddingBottom: 10, position: 'relative', zIndex: 5,
    }}>
      <div style={{
        display: 'flex', alignItems: 'center', justifyContent: 'space-between',
        padding: '0 16px',
      }}>
        {/* back chevron */}
        {pillIcon(
          <svg width="12" height="20" viewBox="0 0 12 20" fill="none" style={{ marginLeft: -1 }}>
            <path d="M10 2L2 10l8 8" stroke={muted} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
          </svg>
        )}
        {/* trailing ellipsis */}
        {trailingIcon && pillIcon(
          <svg width="22" height="6" viewBox="0 0 22 6">
            <circle cx="3" cy="3" r="2.5" fill={muted}/>
            <circle cx="11" cy="3" r="2.5" fill={muted}/>
            <circle cx="19" cy="3" r="2.5" fill={muted}/>
          </svg>
        )}
      </div>
      {/* large title */}
      <div style={{
        padding: '0 16px',
        fontFamily: '-apple-system, system-ui',
        fontSize: 34, fontWeight: 700, lineHeight: '41px',
        color: text, letterSpacing: 0.4,
      }}>{title}</div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Grouped list (inset card, r:26) + row (52px)
// ─────────────────────────────────────────────────────────────
function IOSListRow({ title, detail, icon, chevron = true, isLast = false, dark = false }) {
  const text = dark ? '#fff' : '#000';
  const sec = dark ? 'rgba(235,235,245,0.6)' : 'rgba(60,60,67,0.6)';
  const ter = dark ? 'rgba(235,235,245,0.3)' : 'rgba(60,60,67,0.3)';
  const sep = dark ? 'rgba(84,84,88,0.65)' : 'rgba(60,60,67,0.12)';
  return (
    <div style={{
      display: 'flex', alignItems: 'center', minHeight: 52,
      padding: '0 16px', position: 'relative',
      fontFamily: '-apple-system, system-ui', fontSize: 17,
      letterSpacing: -0.43,
    }}>
      {icon && (
        <div style={{
          width: 30, height: 30, borderRadius: 7, background: icon,
          marginRight: 12, flexShrink: 0,
        }} />
      )}
      <div style={{ flex: 1, color: text }}>{title}</div>
      {detail && <span style={{ color: sec, marginRight: 6 }}>{detail}</span>}
      {chevron && (
        <svg width="8" height="14" viewBox="0 0 8 14" style={{ flexShrink: 0 }}>
          <path d="M1 1l6 6-6 6" stroke={ter} strokeWidth="2" fill="none" strokeLinecap="round" strokeLinejoin="round"/>
        </svg>
      )}
      {!isLast && (
        <div style={{
          position: 'absolute', bottom: 0, right: 0,
          left: icon ? 58 : 16, height: 0.5, background: sep,
        }} />
      )}
    </div>
  );
}

function IOSList({ header, children, dark = false }) {
  const hc = dark ? 'rgba(235,235,245,0.6)' : 'rgba(60,60,67,0.6)';
  const bg = dark ? '#1C1C1E' : '#fff';
  return (
    <div>
      {header && (
        <div style={{
          fontFamily: '-apple-system, system-ui', fontSize: 13,
          color: hc, textTransform: 'uppercase',
          padding: '8px 36px 6px', letterSpacing: -0.08,
        }}>{header}</div>
      )}
      <div style={{
        background: bg, borderRadius: 26,
        margin: '0 16px', overflow: 'hidden',
      }}>{children}</div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Device frame
// ─────────────────────────────────────────────────────────────
function IOSDevice({
  children, width = 402, height = 874, dark = false,
  title, keyboard = false,
}) {
  return (
    <div style={{
      width, height, borderRadius: 48, overflow: 'hidden',
      position: 'relative', background: dark ? '#000' : '#F2F2F7',
      boxShadow: '0 40px 80px rgba(0,0,0,0.18), 0 0 0 1px rgba(0,0,0,0.12)',
      fontFamily: '-apple-system, system-ui, sans-serif',
      WebkitFontSmoothing: 'antialiased',
    }}>
      {/* dynamic island */}
      <div style={{
        position: 'absolute', top: 11, left: '50%', transform: 'translateX(-50%)',
        width: 126, height: 37, borderRadius: 24, background: '#000', zIndex: 50,
      }} />
      {/* status bar (absolute) */}
      <div style={{ position: 'absolute', top: 0, left: 0, right: 0, zIndex: 10 }}>
        <IOSStatusBar dark={dark} />
      </div>
      {/* nav + content */}
      <div style={{ height: '100%', display: 'flex', flexDirection: 'column' }}>
        {title !== undefined && <IOSNavBar title={title} dark={dark} />}
        <div style={{ flex: 1, overflow: 'auto' }}>{children}</div>
        {keyboard && <IOSKeyboard dark={dark} />}
      </div>
      {/* home indicator — always on top */}
      <div style={{
        position: 'absolute', bottom: 0, left: 0, right: 0, zIndex: 60,
        height: 34, display: 'flex', justifyContent: 'center', alignItems: 'flex-end',
        paddingBottom: 8, pointerEvents: 'none',
      }}>
        <div style={{
          width: 139, height: 5, borderRadius: 100,
          background: dark ? 'rgba(255,255,255,0.7)' : 'rgba(0,0,0,0.25)',
        }} />
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Keyboard — iOS 26 liquid glass
// ─────────────────────────────────────────────────────────────
function IOSKeyboard({ dark = false }) {
  const glyph = dark ? 'rgba(255,255,255,0.7)' : '#595959';
  const sugg = dark ? 'rgba(255,255,255,0.6)' : '#333';
  const keyBg = dark ? 'rgba(255,255,255,0.22)' : 'rgba(255,255,255,0.85)';

  // special-key icons
  const icons = {
    shift: <svg width="19" height="17" viewBox="0 0 19 17"><path d="M9.5 1L1 9.5h4.5V16h8V9.5H18L9.5 1z" fill={glyph}/></svg>,
    del: <svg width="23" height="17" viewBox="0 0 23 17"><path d="M7 1h13a2 2 0 012 2v11a2 2 0 01-2 2H7l-6-7.5L7 1z" fill="none" stroke={glyph} strokeWidth="1.6" strokeLinejoin="round"/><path d="M10 5l7 7M17 5l-7 7" stroke={glyph} strokeWidth="1.6" strokeLinecap="round"/></svg>,
    ret: <svg width="20" height="14" viewBox="0 0 20 14"><path d="M18 1v6H4m0 0l4-4M4 7l4 4" fill="none" stroke="#fff" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/></svg>,
  };

  const key = (content, { w, flex, ret, fs = 25, k } = {}) => (
    <div key={k} style={{
      height: 42, borderRadius: 8.5,
      flex: flex ? 1 : undefined, width: w, minWidth: 0,
      background: ret ? '#08f' : keyBg,
      boxShadow: '0 1px 0 rgba(0,0,0,0.075)',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      fontFamily: '-apple-system, "SF Compact", system-ui',
      fontSize: fs, fontWeight: 458, color: ret ? '#fff' : glyph,
    }}>{content}</div>
  );

  const row = (keys, pad = 0) => (
    <div style={{ display: 'flex', gap: 6.5, justifyContent: 'center', padding: `0 ${pad}px` }}>
      {keys.map(l => key(l, { flex: true, k: l }))}
    </div>
  );

  return (
    <div style={{
      position: 'relative', zIndex: 15, borderRadius: 27, overflow: 'hidden',
      padding: '11px 0 2px',
      display: 'flex', flexDirection: 'column', alignItems: 'center',
      boxShadow: dark
        ? '0 -2px 20px rgba(0,0,0,0.09)'
        : '0 -1px 6px rgba(0,0,0,0.018), 0 -3px 20px rgba(0,0,0,0.012)',
    }}>
      {/* liquid glass bg — same recipe as nav pills */}
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 27,
        backdropFilter: 'blur(12px) saturate(180%)',
        WebkitBackdropFilter: 'blur(12px) saturate(180%)',
        background: dark ? 'rgba(120,120,128,0.14)' : 'rgba(255,255,255,0.25)',
      }} />
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 27,
        boxShadow: dark
          ? 'inset 1.5px 1.5px 1px rgba(255,255,255,0.15)'
          : 'inset 1.5px 1.5px 1px rgba(255,255,255,0.7), inset -1px -1px 1px rgba(255,255,255,0.4)',
        border: dark ? '0.5px solid rgba(255,255,255,0.15)' : '0.5px solid rgba(0,0,0,0.06)',
        pointerEvents: 'none',
      }} />

      {/* autocorrect bar */}
      <div style={{
        display: 'flex', gap: 20, alignItems: 'center',
        padding: '8px 22px 13px', width: '100%', boxSizing: 'border-box',
        position: 'relative',
      }}>
        {['"The"', 'the', 'to'].map((w, i) => (
          <React.Fragment key={i}>
            {i > 0 && <div style={{ width: 1, height: 25, background: '#ccc', opacity: 0.3 }} />}
            <div style={{
              flex: 1, textAlign: 'center',
              fontFamily: '-apple-system, system-ui', fontSize: 17,
              color: sugg, letterSpacing: -0.43, lineHeight: '22px',
            }}>{w}</div>
          </React.Fragment>
        ))}
      </div>

      {/* key layout */}
      <div style={{
        display: 'flex', flexDirection: 'column', gap: 13,
        padding: '0 6.5px', width: '100%', boxSizing: 'border-box',
        position: 'relative',
      }}>
        {row(['q','w','e','r','t','y','u','i','o','p'])}
        {row(['a','s','d','f','g','h','j','k','l'], 20)}
        <div style={{ display: 'flex', gap: 14.25, alignItems: 'center' }}>
          {key(icons.shift, { w: 45, k: 'shift' })}
          <div style={{ display: 'flex', gap: 6.5, flex: 1 }}>
            {['z','x','c','v','b','n','m'].map(l => key(l, { flex: true, k: l }))}
          </div>
          {key(icons.del, { w: 45, k: 'del' })}
        </div>
        <div style={{ display: 'flex', gap: 6, alignItems: 'center' }}>
          {key('ABC', { w: 92.25, fs: 18, k: 'abc' })}
          {key('', { flex: true, k: 'space' })}
          {key(icons.ret, { w: 92.25, ret: true, k: 'ret' })}
        </div>
      </div>

      {/* bottom spacer (emoji+mic area, icons omitted) */}
      <div style={{ height: 56, width: '100%', position: 'relative' }} />
    </div>
  );
}

Object.assign(window, {
  IOSDevice, IOSStatusBar, IOSNavBar, IOSGlassPill, IOSList, IOSListRow, IOSKeyboard,
});

</script>

<script type="text/babel" data-file="theme.jsx">
// theme.jsx — design tokens + phone frame + shared primitives for Metropol Kart app.
(function () {
  const Icon = window.Icon;

  // ── Design tokens ───────────────────────────────────────────
  const T = {
    coral: '#F2697B', coralDark: '#E04E63', coralSoft: '#FDEEF1', coralPress: '#D94560',
    navy: '#2D2A5A', navySoft: '#EAE9F2',
    green: '#5FA37F', greenDark: '#4F8C6C', greenSoft: '#E9F3EE',
    purple: '#7C5CBF', blue: '#3D8BD4',
    bg: '#F4F4F7', card: '#FFFFFF',
    ink: '#1C1B2E', ink2: '#6E6D7E', ink3: '#A6A5B3',

    shadow: '0 6px 20px rgba(45,42,90,0.08)',
    shadowSm: '0 2px 8px rgba(45,42,90,0.06)',
    shadowUp: '0 -2px 16px rgba(45,42,90,0.07)',
  };

  // brand accent override hook (white-label) — App reassigns these before render
  T.brand = T.coral; T.brandDark = T.coralDark; T.brandSoft = T.coralSoft;

  const fmt = (n) => Number(n).toLocaleString('tr-TR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  const fmt0 = (n) => Number(n).toLocaleString('tr-TR');

  // ── Phone frame ─────────────────────────────────────────────
  function Phone({ children, statusDark = false, scale }) {
    const W = 390, H = 844;
    return (
      <div style={{
        width: W, height: H, borderRadius: 52, position: 'relative',
        background: '#000', padding: 4, boxSizing: 'border-box',
        boxShadow: '0 50px 100px rgba(28,27,46,0.28), 0 0 0 1px rgba(0,0,0,0.2)',
        transform: scale ? `scale(${scale})` : undefined, transformOrigin: 'center top',
      }}>
        <div style={{
          width: '100%', height: '100%', borderRadius: 48, overflow: 'hidden',
          position: 'relative', background: T.bg, fontFamily: T.font,
          WebkitFontSmoothing: 'antialiased', display: 'flex', flexDirection: 'column',
        }}>
          {/* dynamic island */}
          <div style={{
            position: 'absolute', top: 9, left: '50%', transform: 'translateX(-50%)',
            width: 120, height: 34, borderRadius: 22, background: '#000', zIndex: 90,
          }} />
          {/* status bar */}
          <div style={{ position: 'absolute', top: 0, left: 0, right: 0, zIndex: 80, pointerEvents: 'none' }}>
            {window.IOSStatusBar ? <window.IOSStatusBar dark={statusDark} /> : <div style={{ height: 54 }} />}
          </div>
          {children}
          {/* home indicator */}
          <div style={{
            position: 'absolute', bottom: 7, left: 0, right: 0, zIndex: 95,
            display: 'flex', justifyContent: 'center', pointerEvents: 'none',
          }}>
            <div style={{ width: 134, height: 5, borderRadius: 100, background: statusDark ? 'rgba(255,255,255,0.85)' : 'rgba(28,27,46,0.32)' }} />
          </div>
        </div>
      </div>
    );
  }

  // ── Screen scaffold: fixed top bar + scroll body ────────────
  const STATUS_H = 56;
  function Screen({ children, bg = T.bg, padBottom = 24, noScroll = false, scrollRef }) {
    return (
      <div style={{ flex: 1, minHeight: 0, display: 'flex', flexDirection: 'column', background: bg }}>
        <div ref={scrollRef} style={{
          flex: 1, minHeight: 0, overflowY: noScroll ? 'hidden' : 'auto',
          WebkitOverflowScrolling: 'touch', overscrollBehavior: 'contain',
        }}>
          <div style={{ paddingBottom: padBottom }}>{children}</div>
        </div>
      </div>
    );
  }

  // ── Top bar (back + title + brand/trailing) ─────────────────
  function TopBar({ title, onBack, brand, trailing, color = T.ink, bg = T.card, border = true, large }) {
    return (
      <div style={{
        paddingTop: STATUS_H, background: bg, position: 'relative', zIndex: 30,
        borderBottom: border ? `1px solid ${T.line2}` : 'none',
        boxShadow: border ? '0 1px 0 rgba(45,42,90,0.02)' : 'none',
      }}>
        <div style={{ height: 52, display: 'flex', alignItems: 'center', padding: '0 8px', gap: 4 }}>
          <div style={{ width: 64, display: 'flex', justifyContent: 'flex-start' }}>
            {onBack && (
              <button onClick={onBack} style={iconBtn(color)} aria-label="Geri">
                <Icon name="back" size={24} color={color} strokeWidth={2.2} />
              </button>
            )}
          </div>
          <div style={{ flex: 1, textAlign: 'center', fontSize: 17, fontWeight: 700, color, letterSpacing: -0.3, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{title}</div>
          <div style={{ width: 64, display: 'flex', justifyContent: 'flex-end', alignItems: 'center', gap: 2 }}>
            {trailing}
            {brand && <BrandMark color={color} />}
          </div>
        </div>
        {large && <div style={{ fontSize: 30, fontWeight: 800, color, letterSpacing: -0.6, padding: '2px 18px 14px' }}>{large}</div>}
      </div>
    );
  }
  const iconBtn = (color) => ({ background: 'none', border: 'none', cursor: 'pointer', padding: 8, display: 'flex', alignItems: 'center', justifyContent: 'center', color });

  // ── Brand wordmark (white-label placeholder) ────────────────
  function BrandMark({ color = T.navy, size = 1 }) {
    return (
      <div style={{ display: 'flex', alignItems: 'center', gap: 6 * size }}>
        <div style={{ width: 22 * size, height: 22 * size, borderRadius: 7 * size, background: T.brand, display: 'flex', alignItems: 'center', justifyContent: 'center', boxShadow: '0 2px 6px rgba(242,105,123,0.4)' }}>
          <div style={{ width: 9 * size, height: 9 * size, borderRadius: 3 * size, background: '#fff' }} />
        </div>
        <span style={{ fontSize: 15 * size, fontWeight: 800, color, letterSpacing: -0.4 }}>metropol<span style={{ fontWeight: 500, opacity: 0.6 }}>kart</span></span>
      </div>
    );
  }

  // ── Buttons ─────────────────────────────────────────────────
  function Btn({ children, onClick, variant = 'coral', size = 'lg', icon, disabled, full = true, style }) {
    const v = {
      coral: { bg: T.brand, fg: '#fff', sh: '0 8px 20px rgba(242,105,123,0.32)' },
      green: { bg: T.green, fg: '#fff', sh: '0 8px 20px rgba(95,163,127,0.3)' },
      navy: { bg: T.navy, fg: '#fff', sh: '0 8px 20px rgba(45,42,90,0.25)' },
      light: { bg: T.brandSoft, fg: T.brandDark, sh: 'none' },
      outline: { bg: 'transparent', fg: T.navy, sh: 'none', border: `1.5px solid ${T.line}` },
      ghost: { bg: 'rgba(45,42,90,0.05)', fg: T.navy, sh: 'none' },
    }[variant];
    const h = size === 'sm' ? 38 : size === 'md' ? 46 : 54;
    return (
      <button onClick={disabled ? undefined : onClick} disabled={disabled} style={{
        height: h, width: full ? '100%' : undefined, padding: full ? 0 : '0 22px',
        borderRadius: 999, border: v.border || 'none', background: v.bg, color: v.fg,
        fontSize: size === 'sm' ? 14 : 16, fontWeight: 700, fontFamily: T.font, letterSpacing: -0.2,
        cursor: disabled ? 'default' : 'pointer', boxShadow: disabled ? 'none' : v.sh,
        opacity: disabled ? 0.45 : 1, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8,
        transition: 'transform .12s, opacity .15s', WebkitTapHighlightColor: 'transparent', ...style,
      }}
        onPointerDown={e => { if (!disabled) e.currentTarget.style.transform = 'scale(0.97)'; }}
        onPointerUp={e => e.currentTarget.style.transform = 'scale(1)'}
        onPointerLeave={e => e.currentTarget.style.transform = 'scale(1)'}>
        {icon && <Icon name={icon} size={size === 'sm' ? 17 : 20} color={v.fg} strokeWidth={2} />}
        {children}
      </button>
    );
  }

  // ── Inputs ──────────────────────────────────────────────────
  function Field({ label, children, hint, style }) {
    return (
      <label style={{ display: 'block', ...style }}>
        {label && <div style={{ fontSize: 13, fontWeight: 600, color: T.ink2, marginBottom: 7, marginLeft: 4 }}>{label}</div>}
        {children}
        {hint && <div style={{ fontSize: 12, color: T.ink3, marginTop: 6, marginLeft: 4 }}>{hint}</div>}
      </label>
    );
  }
  function Input({ value, onChange, placeholder, type = 'text', icon, prefix, suffix, inputMode, maxLength, align, autoFocus, big }) {
    const [foc, setFoc] = React.useState(false);
    return (
      <div style={{
        display: 'flex', alignItems: 'center', gap: 10, height: big ? 60 : 52, padding: '0 16px',
        background: T.card, borderRadius: T.radiusSm, border: `1.5px solid ${foc ? T.brand : T.line}`,
        transition: 'border-color .15s', boxShadow: foc ? '0 0 0 4px rgba(242,105,123,0.1)' : 'none',
      }}>
        {icon && <Icon name={icon} size={20} color={foc ? T.brand : T.ink3} />}
        {prefix && <span style={{ fontSize: big ? 24 : 16, fontWeight: 700, color: T.ink2 }}>{prefix}</span>}
        <input
          value={value} onChange={e => onChange && onChange(e.target.value)} placeholder={placeholder}
          type={type} inputMode={inputMode} maxLength={maxLength} autoFocus={autoFocus}
          onFocus={() => setFoc(true)} onBlur={() => setFoc(false)}
          style={{
            flex: 1, border: 'none', outline: 'none', background: 'transparent', minWidth: 0,
            fontSize: big ? 26 : 16, fontWeight: big ? 800 : 500, fontFamily: T.font, color: T.ink,
            textAlign: align || 'left', letterSpacing: big ? 0.5 : -0.2,
          }} />
        {suffix && <span style={{ fontSize: 15, fontWeight: 600, color: T.ink3 }}>{suffix}</span>}
      </div>
    );
  }

  // ── OTP / code boxes ────────────────────────────────────────
  function CodeInput({ length = 6, value, onChange, autoFocus }) {
    const refs = React.useRef([]);
    const set = (i, v) => {
      v = v.replace(/\D/g, '').slice(-1);
      const arr = value.split('');
      arr[i] = v; const next = arr.join('').slice(0, length);
      onChange(next);
      if (v && i < length - 1) refs.current[i + 1] && refs.current[i + 1].focus();
    };
    const key = (i, e) => { if (e.key === 'Backspace' && !value[i] && i > 0) refs.current[i - 1].focus(); };
    return (
      <div style={{ display: 'flex', gap: 10, justifyContent: 'center' }}>
        {Array.from({ length }).map((_, i) => {
          const filled = !!value[i];
          return (
            <input key={i} ref={el => refs.current[i] = el} value={value[i] || ''}
              onChange={e => set(i, e.target.value)} onKeyDown={e => key(i, e)}
              inputMode="numeric" maxLength={1} autoFocus={autoFocus && i === 0}
              style={{
                width: 48, height: 58, textAlign: 'center', fontSize: 26, fontWeight: 800,
                fontFamily: T.font, color: T.navy, background: T.card, caretColor: T.brand,
                border: `2px solid ${filled ? T.brand : T.line}`, borderRadius: 14, outline: 'none',
                boxShadow: filled ? '0 4px 12px rgba(242,105,123,0.18)' : 'none', transition: 'all .15s',
              }} />
          );
        })}
      </div>
    );
  }

  // ── Card / Section / ListRow ────────────────────────────────
  function Panel({ children, style, pad = 16, onClick }) {
    return <div onClick={onClick} style={{ background: T.card, borderRadius: T.radius, boxShadow: T.shadowSm, padding: pad, cursor: onClick ? 'pointer' : undefined, ...style }}>{children}</div>;
  }
  function SectionTitle({ children, action, onAction, style }) {
    return (
      <div style={{ display: 'flex', alignItems: 'baseline', justifyContent: 'space-between', padding: '0 4px', margin: '0 0 12px', ...style }}>
        <h3 style={{ margin: 0, fontSize: 19, fontWeight: 800, color: T.ink, letterSpacing: -0.4 }}>{children}</h3>
        {action && <button onClick={onAction} style={{ background: 'none', border: 'none', color: T.brand, fontSize: 14, fontWeight: 700, fontFamily: T.font, cursor: 'pointer' }}>{action}</button>}
      </div>
    );
  }
  function Row({ icon, iconBg, iconColor, title, sub, right, onClick, chevron, last, badge, danger }) {
    return (
      <div onClick={onClick} style={{
        display: 'flex', alignItems: 'center', gap: 13, padding: '13px 16px', cursor: onClick ? 'pointer' : undefined,
        borderBottom: last ? 'none' : `1px solid ${T.line2}`, position: 'relative', WebkitTapHighlightColor: 'transparent',

        {icon && (
          <div style={{ width: 40, height: 40, borderRadius: 12, background: iconBg || T.coralSoft, display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>
            {typeof icon === 'string' ? <Icon name={icon} size={21} color={iconColor || T.brand} strokeWidth={1.9} /> : icon}
          </div>
        )}
        <div style={{ flex: 1, minWidth: 0 }}>
          <div style={{ fontSize: 15.5, fontWeight: 600, color: danger ? T.coralDark : T.ink, letterSpacing: -0.2, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{title}</div>
          {sub && <div style={{ fontSize: 13, color: T.ink2, marginTop: 2, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{sub}</div>}
        </div>
        {badge}
        {right && <div style={{ flexShrink: 0 }}>{right}</div>}
        {chevron && <Icon name="chevron" size={18} color={T.ink3} strokeWidth={2} />}
      </div>
    );
  }

  // ── Badge / Pill / Toggle / Segmented ───────────────────────
  function Badge({ children, color = T.green, soft = true, style }) {
    return <span style={{
      display: 'inline-flex', alignItems: 'center', gap: 4, padding: '4px 10px', borderRadius: 999,
      fontSize: 12, fontWeight: 700, letterSpacing: -0.1,
      background: soft ? hexA(color, 0.13) : color, color: soft ? color : '#fff', ...style,
    }}>{children}</span>;
  }
  function Toggle({ on, onChange }) {
    return (
      <button onClick={() => onChange(!on)} style={{
        width: 51, height: 31, borderRadius: 999, border: 'none', cursor: 'pointer', padding: 2,
        background: on ? T.green : 'rgba(45,42,90,0.18)', transition: 'background .2s', position: 'relative',
      }}>
        <div style={{ width: 27, height: 27, borderRadius: 999, background: '#fff', boxShadow: '0 2px 5px rgba(0,0,0,0.2)', transform: `translateX(${on ? 20 : 0}px)`, transition: 'transform .2s' }} />
      </button>
    );
  }
  function Segmented({ options, value, onChange, style }) {
    return (
      <div style={{ display: 'flex', background: 'rgba(45,42,90,0.06)', borderRadius: 12, padding: 3, gap: 2, ...style }}>
        {options.map(o => {
          const active = o.value === value;
          return (
            <button key={o.value} onClick={() => onChange(o.value)} style={{
              flex: 1, height: 36, border: 'none', borderRadius: 9, cursor: 'pointer', fontFamily: T.font,
              fontSize: 14, fontWeight: 700, letterSpacing: -0.2, color: active ? T.ink : T.ink2,
              background: active ? T.card : 'transparent', boxShadow: active ? '0 1px 4px rgba(45,42,90,0.12)' : 'none',
              transition: 'all .18s',
            }}>{o.label}</button>
          );
        })}
      </div>
    );
  }

  // ── Striped image placeholder ───────────────────────────────
  function Ph({ label, h = 120, r = 14, accent = T.navy, style, children }) {
    return (
      <div style={{
        height: h, borderRadius: r, position: 'relative', overflow: 'hidden',
        background: `repeating-linear-gradient(135deg, ${hexA(accent, 0.07)}, ${hexA(accent, 0.07)} 11px, ${hexA(accent, 0.03)} 11px, ${hexA(accent, 0.03)} 22px)`,
        border: `1px solid ${hexA(accent, 0.12)}`, display: 'flex', alignItems: 'center', justifyContent: 'center', ...style,
      }}>
        {children || (label && <span style={{ fontFamily: 'ui-monospace, SFMono-Regular, Menlo, monospace', fontSize: 11, fontWeight: 600, color: hexA(accent, 0.55), letterSpacing: 0.3, textTransform: 'uppercase', padding: '0 12px', textAlign: 'center' }}>{label}</span>)}
      </div>
    );
  }

  // ── Empty / Loading ─────────────────────────────────────────
  function Empty({ icon = 'document', title, sub, action }) {
    return (
      <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', textAlign: 'center', padding: '56px 32px', gap: 6 }}>
        <div style={{ width: 76, height: 76, borderRadius: 24, background: T.coralSoft, display: 'flex', alignItems: 'center', justifyContent: 'center', marginBottom: 8 }}>
          <Icon name={icon} size={34} color={T.brand} strokeWidth={1.6} />
        </div>
        <div style={{ fontSize: 18, fontWeight: 800, color: T.ink }}>{title}</div>
        {sub && <div style={{ fontSize: 14, color: T.ink2, lineHeight: 1.5, maxWidth: 240 }}>{sub}</div>}
        {action && <div style={{ marginTop: 14 }}>{action}</div>}
      </div>
    );
  }
  function Spinner({ size = 28, color = T.brand }) {
    return <div style={{ width: size, height: size, borderRadius: '50%', border: `3px solid ${hexA(color, 0.2)}`, borderTopColor: color, animation: 'mspin 0.8s linear infinite' }} />;
  }

  function hexA(hex, a) {
    const h = hex.replace('#', '');
    const n = parseInt(h.length === 3 ? h.split('').map(c => c + c).join('') : h, 16);
    return `rgba(${(n >> 16) & 255},${(n >> 8) & 255},${n & 255},${a})`;
  }

  Object.assign(window, {
    T, fmt, fmt0, hexA, Phone, Screen, TopBar, BrandMark, Btn, Field, Input, CodeInput,
    Panel, SectionTitle, Row, Badge, Toggle, Segmented, Ph, Empty, Spinner, STATUS_H,
  });
})();

</script>

<script type="text/babel" data-file="nav.jsx">
// nav.jsx — navigation context, global store, tab bar.
(function () {
  const { T, hexA } = window;
  const Icon = window.Icon;
  const NavCtx = React.createContext(null);
  window.useApp = () => React.useContext(NavCtx);

  const TABS = [
    { id: 'home', label: 'Ana Sayfa', icon: 'home', root: 'home' },
    { id: 'benefits', label: 'Yan Haklar', icon: 'gift', root: 'benefits' },
    { id: 'metropol', label: 'Metropol', icon: 'card', root: 'metropol', fab: true },
    { id: 'chat', label: 'Sohbet', icon: 'chat', root: 'chatList' },
    { id: 'other', label: 'Diğer', icon: 'grid', root: 'other' },
  ];
  window.TABS = TABS;

  function clone(x) { return JSON.parse(JSON.stringify(x)); }

  function NavProvider({ children }) {
    const [authed, setAuthed] = React.useState(false);
    const [tab, setTab] = React.useState('metropol');
    const [stacks, setStacks] = React.useState({ home: [], benefits: [], metropol: [], chat: [], other: [] });
    const [dir, setDir] = React.useState('fwd'); // fwd | back | tab
    const [menuOpen, setMenuOpen] = React.useState(false);
    const [toast, setToast] = React.useState(null);
    const [activeCard, setActiveCard] = React.useState('c1');
    const [homeVariant, setHomeVariant] = React.useState(1);

    // mutable app data
    const [store, setStore] = React.useState(() => Object.assign(clone(window.SEED), { brandKey: 'coral' }));
    const update = (fn) => setStore(s => { const n = clone(s); fn(n); return n; });
    const setBrandKey = (k) => update(s => { s.brandKey = k; });

    const go = (name, props = {}) => { setDir('fwd'); setStacks(s => ({ ...s, [tab]: [...s[tab], { name, props }] })); };
    const back = () => {
      setDir('back');
      setStacks(s => {
        if (s[tab].length === 0) return s;
        return { ...s, [tab]: s[tab].slice(0, -1) };
      });
    };
    const popTo = (n) => { setDir('back'); setStacks(s => ({ ...s, [tab]: s[tab].slice(0, n) })); };
    const reset = () => { setDir('back'); setStacks(s => ({ ...s, [tab]: [] })); };
    const switchTab = (t) => {
      setDir('tab');
      if (t === tab) { setStacks(s => ({ ...s, [t]: [] })); }
      else setTab(t);
    };
    const showToast = (msg, kind = 'ok') => { setToast({ msg, kind, id: Date.now() }); setTimeout(() => setToast(null), 2200); };

    const stack = stacks[tab];
    const depth = stack.length;

    const value = {
      authed, setAuthed, tab, switchTab, stack, depth, dir, go, back, popTo, reset,
      menuOpen, setMenuOpen, toast, showToast, store, update, setBrandKey,
      activeCard, setActiveCard, homeVariant, setHomeVariant,
      cardById: (id) => store.cards.find(c => c.id === id),
    };
    return <NavCtx.Provider value={value}>{children}</NavCtx.Provider>;
  }

  // ── Tab bar with raised center FAB ──────────────────────────
  function TabBar() {
    const app = window.useApp();
    return (
      <div style={{ position: 'absolute', bottom: 0, left: 0, right: 0, zIndex: 40 }}>
        <div style={{
          background: 'rgba(255,255,255,0.92)', backdropFilter: 'blur(18px) saturate(180%)',
          WebkitBackdropFilter: 'blur(18px) saturate(180%)', boxShadow: T.shadowUp,
          borderTop: `1px solid ${T.line2}`, paddingBottom: 22, paddingTop: 8, position: 'relative',
        }}>
          <div style={{ display: 'flex', alignItems: 'flex-end', justifyContent: 'space-around', padding: '0 6px' }}>
            {TABS.map(t => {
              const active = app.tab === t.id;
              if (t.fab) {
                return (
                  <button key={t.id} onClick={() => app.switchTab(t.id)} style={{
                    background: 'none', border: 'none', cursor: 'pointer', padding: 0,
                    transform: 'translateY(-18px)', display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 5,
                  }}>
                    <div style={{
                      width: 60, height: 60, borderRadius: 22, background: `linear-gradient(160deg, ${T.brand}, ${T.brandDark})`,
                      display: 'flex', alignItems: 'center', justifyContent: 'center',
                      boxShadow: `0 10px 24px ${hexA(T.brand, 0.5)}, 0 0 0 5px rgba(255,255,255,0.95)`,
                      transition: 'transform .15s', transform: active ? 'scale(1.04)' : 'scale(1)',
                    }}>
                      <Icon name="card" size={28} color="#fff" strokeWidth={2} />
                    </div>
                    <span style={{ fontSize: 10.5, fontWeight: 700, color: active ? T.brandDark : T.ink2, transform: 'translateY(2px)' }}>{t.label}</span>
                  </button>
                );
              }
              return (
                <button key={t.id} onClick={() => app.switchTab(t.id)} style={{
                  background: 'none', border: 'none', cursor: 'pointer', flex: 1, maxWidth: 70,
                  display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 4, padding: '4px 0',
                }}>
                  <Icon name={t.icon} size={25} color={active ? T.brandDark : T.ink3} strokeWidth={active ? 2.2 : 1.8} />
                  <span style={{ fontSize: 10.5, fontWeight: active ? 700 : 600, color: active ? T.brandDark : T.ink3, letterSpacing: -0.2 }}>{t.label}</span>
                </button>
              );
            })}
          </div>
        </div>
      </div>
    );
  }

  // ── Toast ───────────────────────────────────────────────────
  function Toast() {
    const app = window.useApp();
    if (!app.toast) return null;
    const ok = app.toast.kind === 'ok';
    return (
      <div style={{
        position: 'absolute', top: 70, left: 16, right: 16, zIndex: 100,
        background: T.navy, color: '#fff', borderRadius: 16, padding: '13px 16px',
        display: 'flex', alignItems: 'center', gap: 10, boxShadow: '0 12px 30px rgba(28,27,46,0.4)',
        animation: 'toastIn .3s cubic-bezier(.2,.9,.3,1.2)', fontSize: 14, fontWeight: 600,
      }}>
        <div style={{ width: 26, height: 26, borderRadius: 999, background: ok ? T.green : T.coral, display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>
          <Icon name={ok ? 'check' : 'close'} size={16} color="#fff" strokeWidth={2.6} />
        </div>
        {app.toast.msg}
      </div>
    );
  }

  Object.assign(window, { NavProvider, TabBar, Toast });
})();

</script>

<script type="text/babel" data-file="screens-auth.jsx">

(function () {
  const { T, hexA, Btn, Field, Input, CodeInput, Ph } = window;
  const Icon = window.Icon;

  function AuthHost() {
    const app = window.useApp();
    const [step, setStep] = React.useState('welcome');
    const [code, setCode] = React.useState('');
    const [phone, setPhone] = React.useState('');
    const [otp, setOtp] = React.useState('');
    const [kvkk, setKvkk] = React.useState(false);
    const [r, setR] = React.useState({ first: '', last: '', email: '' });
    const [sec, setSec] = React.useState(0);
    React.useEffect(() => { if (sec > 0) { const t = setTimeout(() => setSec(sec - 1), 1000); return () => clearTimeout(t); } }, [sec]);

    const go = (s, opts = {}) => { setStep(s); if (opts.timer) setSec(58); };

    const Wrap = ({ children, back }) => (
      <div style={{ flex: 1, minHeight: 0, display: 'flex', flexDirection: 'column', background: T.bg }}>
        <div style={{ paddingTop: window.STATUS_H }} />
        {back && <div style={{ padding: '6px 8px' }}><button onClick={back} style={{ background: 'none', border: 'none', cursor: 'pointer', padding: 8 }}><Icon name="back" size={24} color={T.ink} strokeWidth={2.2} /></button></div>}
        <div style={{ flex: 1, minHeight: 0, overflowY: 'auto', padding: '8px 24px 28px', display: 'flex', flexDirection: 'column' }}>{children}</div>
      </div>
    );

    if (step === 'welcome') {
      return (
        <Wrap>
          <div style={{ flex: 1, display: 'flex', flexDirection: 'column', justifyContent: 'center' }}>
            <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', marginBottom: 36 }}>
              <div style={{ width: 76, height: 76, borderRadius: 24, background: `linear-gradient(160deg, ${T.brand}, ${T.brandDark})`, display: 'flex', alignItems: 'center', justifyContent: 'center', boxShadow: `0 16px 32px ${hexA(T.brand, 0.4)}`, marginBottom: 20 }}>
                <Icon name="card" size={38} color="#fff" strokeWidth={1.8} />
              </div>
              <h1 style={{ margin: 0, fontSize: 28, fontWeight: 800, color: T.ink, letterSpacing: -0.8 }}>Hoş geldiniz</h1>
              <p style={{ margin: '8px 0 0', fontSize: 15, color: T.ink2, textAlign: 'center', lineHeight: 1.5 }}>Firma kodunuzu girerek kurumsal<br />yan haklar uygulamanıza başlayın.</p>
            </div>
            <Field label="Firma Kodu" style={{ marginBottom: 16 }}>
              <Input value={code} onChange={v => setCode(v.toUpperCase())} placeholder="Örn. NOVA" icon="briefcase" />
            </Field>
            <Btn variant="coral" onClick={() => go('phone')} disabled={code.length < 2}>Devam Et</Btn>
            <button onClick={() => go('phone')} style={{ background: 'none', border: 'none', color: T.ink2, fontSize: 13.5, fontWeight: 600, marginTop: 18, cursor: 'pointer', fontFamily: T.font }}>Firma kodunuz yok mu? <span style={{ color: T.brand, fontWeight: 700 }}>Yardım alın</span></button>
          </div>
          <div style={{ textAlign: 'center', fontSize: 11.5, color: T.ink3, marginTop: 20 }}>Powered by metropolkart · v3.2</div>
        </Wrap>
      );
    }

    if (step === 'phone') {
      return (
        <Wrap back={() => go('welcome')}>
          <div style={{ marginBottom: 28 }}>
            <h1 style={{ margin: 0, fontSize: 26, fontWeight: 800, color: T.ink, letterSpacing: -0.6 }}>Telefon numaranız</h1>
            <p style={{ margin: '8px 0 0', fontSize: 15, color: T.ink2, lineHeight: 1.5 }}>Doğrulama kodu göndereceğiz. Numaranız firma kaydınızla eşleşmeli.</p>
          </div>
          <Field label="Cep Telefonu" style={{ marginBottom: 18 }}>
            <Input value={phone} onChange={setPhone} placeholder="5XX XXX XX XX" prefix="+90" inputMode="tel" icon="phone" />
          </Field>
          <button onClick={() => setKvkk(!kvkk)} style={{ display: 'flex', gap: 11, alignItems: 'flex-start', background: 'none', border: 'none', cursor: 'pointer', textAlign: 'left', padding: 0, marginBottom: 24 }}>
            <div style={{ width: 22, height: 22, borderRadius: 7, flexShrink: 0, marginTop: 1, background: kvkk ? T.green : 'transparent', border: `2px solid ${kvkk ? T.green : T.line}`, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
              {kvkk && <Icon name="check" size={14} color="#fff" strokeWidth={3} />}
            </div>
            <span style={{ fontSize: 12.5, color: T.ink2, lineHeight: 1.5 }}><b style={{ color: T.ink }}>KVKK Aydınlatma Metni</b>’ni ve <b style={{ color: T.ink }}>Kullanım Koşulları</b>’nı okudum, onaylıyorum.</span>
          </button>
          <div style={{ flex: 1 }} />
          <Btn variant="coral" onClick={() => go('otp', { timer: true })} disabled={phone.length < 10 || !kvkk}>Kod Gönder</Btn>
          <button onClick={() => go('register')} style={{ background: 'none', border: 'none', color: T.ink2, fontSize: 13.5, fontWeight: 600, marginTop: 16, cursor: 'pointer', fontFamily: T.font, textAlign: 'center' }}>Hesabınız yok mu? <span style={{ color: T.brand, fontWeight: 700 }}>Kayıt Olun</span></button>
        </Wrap>
      );
    }

    if (step === 'otp') {
      return (
        <Wrap back={() => go('phone')}>
          <div style={{ marginBottom: 30 }}>
            <h1 style={{ margin: 0, fontSize: 26, fontWeight: 800, color: T.ink, letterSpacing: -0.6 }}>Doğrulama kodu</h1>
            <p style={{ margin: '8px 0 0', fontSize: 15, color: T.ink2, lineHeight: 1.5 }}><b style={{ color: T.ink }}>+90 {phone}</b> numarasına gönderilen 6 haneli kodu girin.</p>
          </div>
          <CodeInput value={otp} onChange={setOtp} autoFocus />
          <div style={{ textAlign: 'center', marginTop: 22, fontSize: 14, color: T.ink2 }}>
            {sec > 0 ? <span>Kodu tekrar gönder · <b style={{ color: T.ink }}>0:{String(sec).padStart(2, '0')}</b></span>
              : <button onClick={() => setSec(58)} style={{ background: 'none', border: 'none', color: T.brand, fontWeight: 700, fontSize: 14, cursor: 'pointer', fontFamily: T.font }}>Kodu tekrar gönder</button>}
          </div>
          <div style={{ flex: 1 }} />
          <Btn variant="coral" onClick={() => app.setAuthed(true)} disabled={otp.length < 6}>Doğrula ve Giriş Yap</Btn>
        </Wrap>
      );
    }

    // register
    return (
      <Wrap back={() => go('phone')}>
        <div style={{ marginBottom: 24 }}>
          <h1 style={{ margin: 0, fontSize: 26, fontWeight: 800, color: T.ink, letterSpacing: -0.6 }}>Kayıt Ol</h1>
          <p style={{ margin: '8px 0 0', fontSize: 15, color: T.ink2, lineHeight: 1.5 }}>Firma kaydınızı tamamlamak için bilgilerinizi girin.</p>
        </div>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
          <Field label="Ad"><Input value={r.first} onChange={v => setR({ ...r, first: v })} placeholder="Adınız" icon="user" /></Field>
          <Field label="Soyad"><Input value={r.last} onChange={v => setR({ ...r, last: v })} placeholder="Soyadınız" /></Field>
          <Field label="Kurumsal E-posta"><Input value={r.email} onChange={v => setR({ ...r, email: v })} placeholder="ad@firma.com" icon="mail" inputMode="email" /></Field>
        </div>
        <div style={{ flex: 1 }} />
        <Btn variant="coral" onClick={() => go('otp', { timer: true })} disabled={!r.first || !r.last || !r.email}>Devam Et</Btn>
      </Wrap>
    );
  }

  // ── Notifications screen (registered in tab nav) ────────────
  function Notifications() {
    const app = window.useApp();
    const items = app.store.notifications;
    return (
      <window.Screen>
        <window.TopBar title="Bildirimler" onBack={app.back} trailing={items.length ? <button onClick={() => app.update(s => s.notifications = [])} style={{ background: 'none', border: 'none', color: T.brand, fontSize: 13, fontWeight: 700, cursor: 'pointer', fontFamily: T.font, padding: 8 }}>Temizle</button> : null} />
        {items.length === 0
          ? <window.Empty icon="bell" title="Bildirim yok" sub="Yeni bildirimleriniz burada görünecek." />
          : <div style={{ padding: 16 }}>
            <window.Panel pad={0}>
              {items.map((n, i) => (
                <window.Row key={n.id} icon={n.icon} iconBg={hexA(n.accent, 0.14)} iconColor={n.accent} title={n.title} sub={n.body}
                  right={<span style={{ fontSize: 12, color: T.ink3, fontWeight: 600 }}>{n.time}</span>} last={i === items.length - 1} />
              ))}
            </window.Panel>
          </div>}
      </window.Screen>
    );
  }

  window.AuthHost = AuthHost;
  window.SCREENS = window.SCREENS || {};
  window.SCREENS.notifications = { C: Notifications };
})();

</script>

<script type="text/babel" data-file="screens-home.jsx">
// screens-home.jsx — Ana Sayfa feed, survey fill, video player.
(function () {
  const { T, hexA, Btn, Panel, Row, SectionTitle, Badge, Ph, BrandMark } = window;
  const Icon = window.Icon;
  window.SCREENS = window.SCREENS || {};

  function HomeHeader() {
    const app = window.useApp();
    const unread = app.store.notifications.length;
    return (
      <div style={{ paddingTop: window.STATUS_H, background: T.card, borderBottom: `1px solid ${T.line2}`, position: 'relative', zIndex: 20 }}>
        <div style={{ height: 52, display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '0 14px' }}>
          <button onClick={() => app.setMenuOpen(true)} style={{ background: 'none', border: 'none', cursor: 'pointer', padding: 8 }}><Icon name="menu" size={24} color={T.ink} strokeWidth={2} /></button>
          <BrandMark color={T.navy} />
          <div style={{ display: 'flex', gap: 2 }}>
            <button onClick={() => app.switchTab('chat')} style={{ background: 'none', border: 'none', cursor: 'pointer', padding: 8 }}><Icon name="chat" size={23} color={T.ink} strokeWidth={1.9} /></button>
            <button onClick={() => app.go('notifications')} style={{ background: 'none', border: 'none', cursor: 'pointer', padding: 8, position: 'relative' }}>
              <Icon name="bell" size={23} color={T.ink} strokeWidth={1.9} />
              {unread > 0 && <span style={{ position: 'absolute', top: 5, right: 5, minWidth: 16, height: 16, padding: '0 4px', borderRadius: 999, background: T.brand, color: '#fff', fontSize: 10, fontWeight: 800, display: 'flex', alignItems: 'center', justifyContent: 'center', border: '1.5px solid #fff' }}>{unread}</span>}
            </button>
          </div>
        </div>
      </div>
    );
  }

  function Home() {
    const app = window.useApp();
    const { announcements, surveys, videos, profile } = app.store;
    return (
      <window.Screen padBottom={120}>
        <HomeHeader />
        <div style={{ padding: '16px 0 0' }}>
          <div style={{ padding: '0 18px 16px' }}>
            <div style={{ fontSize: 14, color: T.ink2 }}>Merhaba,</div>
            <div style={{ fontSize: 24, fontWeight: 800, color: T.ink, letterSpacing: -0.6 }}>{profile.first} 👋</div>
          </div>

          {/* Announcements carousel */}
          <SectionTitle style={{ padding: '0 18px', marginBottom: 12 }} action="Tümü" onAction={() => app.showToast('Tüm duyurular')}>Duyurular</SectionTitle>
          <div style={{ display: 'flex', gap: 14, overflowX: 'auto', padding: '0 18px 4px', scrollSnapType: 'x mandatory', scrollbarWidth: 'none' }}>
            {announcements.map(a => (
              <div key={a.id} onClick={() => app.showToast('Duyuru açıldı')} style={{ flex: '0 0 280px', scrollSnapAlign: 'start', background: T.card, borderRadius: 18, overflow: 'hidden', boxShadow: T.shadowSm, cursor: 'pointer' }}>
                <Ph h={120} r={0} accent={a.accent} label={`KAPAK GÖRSELİ · ${a.tag}`} />
                <div style={{ padding: 14 }}>
                  <Badge color={a.accent}>{a.tag}</Badge>
                  <div style={{ fontSize: 15.5, fontWeight: 800, color: T.ink, margin: '8px 0 4px', letterSpacing: -0.3, lineHeight: 1.25 }}>{a.title}</div>
                  <div style={{ fontSize: 13, color: T.ink2, lineHeight: 1.45, display: '-webkit-box', WebkitLineClamp: 2, WebkitBoxOrient: 'vertical', overflow: 'hidden' }}>{a.body}</div>
                </div>
              </div>
            ))}
          </div>

          {/* Surveys */}
          <div style={{ padding: '24px 18px 0' }}>
            <SectionTitle>Anketler</SectionTitle>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
              {surveys.map(s => (
                <Panel key={s.id} style={{ display: 'flex', alignItems: 'center', gap: 14 }}>
                  <div style={{ width: 46, height: 46, borderRadius: 14, background: hexA(T.purple, 0.13), display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}><Icon name="poll" size={24} color={T.purple} strokeWidth={2} /></div>
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ display: 'flex', alignItems: 'center', gap: 7 }}>
                      <span style={{ fontSize: 15, fontWeight: 700, color: T.ink, letterSpacing: -0.2 }}>{s.title}</span>
                      {s.tag && !s.done && <Badge color={T.coral} style={{ padding: '2px 7px', fontSize: 10.5 }}>{s.tag}</Badge>}
                    </div>
                    <div style={{ fontSize: 12.5, color: T.ink2, marginTop: 2 }}>{s.q} soru · ~{Math.ceil(s.q / 3)} dk</div>
                  </div>
                  {s.done
                    ? <Badge color={T.green} soft={false} style={{ padding: '6px 10px' }}><Icon name="check" size={13} color="#fff" strokeWidth={3} /> Tamamlandı</Badge>
                    : <Btn variant="light" size="sm" full={false} onClick={() => app.go('survey', { id: s.id })}>Katıl</Btn>}
                </Panel>
              ))}
            </div>
          </div>

          {/* Videos */}
          <div style={{ padding: '24px 18px 0' }}>
            <SectionTitle>İzlenecek Videolar</SectionTitle>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
              {videos.map(v => (
                <Panel key={v.id} pad={0} onClick={() => app.go('video', { id: v.id })} style={{ overflow: 'hidden', display: 'flex', alignItems: 'center', gap: 12, padding: 10 }}>
                  <div style={{ position: 'relative', width: 110, flexShrink: 0 }}>
                    <Ph h={70} r={12} accent={T.navy} label="" />
                    <div style={{ position: 'absolute', inset: 0, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                      <div style={{ width: 34, height: 34, borderRadius: 999, background: 'rgba(255,255,255,0.92)', display: 'flex', alignItems: 'center', justifyContent: 'center', boxShadow: T.shadowSm }}><Icon name="play" size={16} color={T.navy} fill={T.navy} /></div>
                    </div>
                    <span style={{ position: 'absolute', bottom: 5, right: 5, background: 'rgba(28,27,46,0.85)', color: '#fff', fontSize: 10.5, fontWeight: 700, padding: '2px 6px', borderRadius: 6 }}>{v.dur}</span>
                  </div>
                  <div style={{ flex: 1, minWidth: 0, paddingRight: 6 }}>
                    <div style={{ display: 'flex', gap: 6, marginBottom: 4 }}>{v.tag && !v.watched && <Badge color={T.coral} style={{ padding: '2px 7px', fontSize: 10.5 }}>{v.tag}</Badge>}</div>
                    <div style={{ fontSize: 14.5, fontWeight: 700, color: T.ink, letterSpacing: -0.2, lineHeight: 1.3 }}>{v.title}</div>
                    <div style={{ display: 'flex', alignItems: 'center', gap: 5, marginTop: 6, fontSize: 12.5, fontWeight: 600, color: v.watched ? T.green : T.ink3 }}>
                      <Icon name={v.watched ? 'check' : 'play'} size={14} color={v.watched ? T.green : T.ink3} strokeWidth={2.4} />{v.watched ? 'İzlendi' : 'İzlenmedi'}
                    </div>
                  </div>
                </Panel>
              ))}
            </div>
          </div>
        </div>
      </window.Screen>
    );
  }

  // ── Survey fill ─────────────────────────────────────────────
  function Survey({ id }) {
    const app = window.useApp();
    const qs = app.store.surveyQuestions;
    const [i, setI] = React.useState(0);
    const [ans, setAns] = React.useState({});
    const q = qs[i];
    const last = i === qs.length - 1;
    const cur = ans[q.id];
    const next = () => {
      if (last) { app.update(s => { const sv = s.surveys.find(x => x.id === id); if (sv) sv.done = true; }); app.back(); app.showToast('Anket tamamlandı 🎉'); }
      else setI(i + 1);
    };
    return (
      <window.Screen padBottom={20}>
        <window.TopBar title="Anket" onBack={() => i === 0 ? app.back() : setI(i - 1)} brand />
        <div style={{ padding: '8px 18px 0' }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 12, marginBottom: 24 }}>
            <div style={{ flex: 1, height: 7, borderRadius: 999, background: hexA(T.purple, 0.14), overflow: 'hidden' }}>
              <div style={{ height: '100%', width: `${((i + 1) / qs.length) * 100}%`, background: T.purple, borderRadius: 999, transition: 'width .3s' }} />
            </div>
            <span style={{ fontSize: 13, fontWeight: 700, color: T.ink2 }}>{i + 1}/{qs.length}</span>
          </div>
          <h2 style={{ margin: '0 0 24px', fontSize: 21, fontWeight: 800, color: T.ink, letterSpacing: -0.4, lineHeight: 1.3 }}>{q.text}</h2>
          {q.type === 'scale' ? (
            <div>
              <div style={{ display: 'flex', gap: 8, justifyContent: 'space-between' }}>
                {[1, 2, 3, 4, 5].map(n => (
                  <button key={n} onClick={() => setAns({ ...ans, [q.id]: n })} style={{ flex: 1, aspectRatio: '1', borderRadius: 16, border: `2px solid ${cur === n ? T.purple : T.line}`, background: cur === n ? T.purple : T.card, color: cur === n ? '#fff' : T.ink, fontSize: 20, fontWeight: 800, cursor: 'pointer', fontFamily: T.font, transition: 'all .12s' }}>{n}</button>
                ))}
              </div>
              <div style={{ display: 'flex', justifyContent: 'space-between', marginTop: 10, fontSize: 12, color: T.ink3, fontWeight: 600 }}><span>Hiç memnun değilim</span><span>Çok memnunum</span></div>
            </div>
          ) : (
            <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
              {q.options.map(o => (
                <button key={o} onClick={() => setAns({ ...ans, [q.id]: o })} style={{ display: 'flex', alignItems: 'center', gap: 12, padding: 16, borderRadius: 14, border: `2px solid ${cur === o ? T.purple : T.line}`, background: cur === o ? hexA(T.purple, 0.07) : T.card, cursor: 'pointer', fontFamily: T.font, textAlign: 'left' }}>
                  <div style={{ width: 22, height: 22, borderRadius: 999, border: `2px solid ${cur === o ? T.purple : T.line}`, background: cur === o ? T.purple : 'transparent', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>{cur === o && <Icon name="check" size={13} color="#fff" strokeWidth={3} />}</div>
                  <span style={{ fontSize: 15, fontWeight: 600, color: T.ink }}>{o}</span>
                </button>
              ))}
            </div>
          )}
        </div>
        <div style={{ padding: '28px 18px 0' }}>
          <Btn variant="navy" disabled={cur === undefined} onClick={next} style={{ background: T.purple, boxShadow: `0 8px 20px ${hexA(T.purple, 0.3)}` }}>{last ? 'Anketi Bitir' : 'Sonraki Soru'}</Btn>
        </div>
      </window.Screen>
    );
  }

  // ── Video player ────────────────────────────────────────────
  function Video({ id }) {
    const app = window.useApp();
    const v = app.store.videos.find(x => x.id === id) || app.store.videos[0];
    const [playing, setPlaying] = React.useState(false);
    const [prog, setProg] = React.useState(v.watched ? 100 : 0);
    React.useEffect(() => {
      if (!playing) return;
      const t = setInterval(() => setProg(p => {
        if (p >= 100) { clearInterval(t); setPlaying(false); app.update(s => { const vv = s.videos.find(x => x.id === id); if (vv) vv.watched = true; }); return 100; }
        return p + 2;
      }), 120);
      return () => clearInterval(t);
    }, [playing]);
    return (
      <window.Screen padBottom={24}>
        <window.TopBar title="Video" onBack={app.back} brand />
        <div style={{ position: 'relative', margin: '14px 18px 0' }}>
          <Ph h={210} r={18} accent={T.navy} label="" />
          <div style={{ position: 'absolute', inset: 0, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
            <button onClick={() => setPlaying(!playing)} style={{ width: 64, height: 64, borderRadius: 999, background: 'rgba(255,255,255,0.95)', border: 'none', cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center', boxShadow: T.shadow }}>
              <Icon name={playing ? 'pause' : 'play'} size={28} color={T.navy} fill={playing ? 'none' : T.navy} strokeWidth={2} />
            </button>
          </div>
          {/* progress */}
          <div style={{ position: 'absolute', left: 14, right: 14, bottom: 14 }}>
            <div style={{ height: 5, borderRadius: 999, background: 'rgba(255,255,255,0.4)', overflow: 'hidden' }}>
              <div style={{ height: '100%', width: `${prog}%`, background: T.brand, borderRadius: 999 }} />
            </div>
          </div>
        </div>
        <div style={{ padding: '18px 18px 0' }}>
          {v.watched && <Badge color={T.green} soft={false} style={{ marginBottom: 10 }}><Icon name="check" size={13} color="#fff" strokeWidth={3} /> İzlendi</Badge>}
          <h2 style={{ margin: 0, fontSize: 20, fontWeight: 800, color: T.ink, letterSpacing: -0.4, lineHeight: 1.3 }}>{v.title}</h2>
          <div style={{ fontSize: 13, color: T.ink2, marginTop: 6 }}>Süre: {v.dur} · Kurumsal Eğitim</div>
          <p style={{ fontSize: 14.5, color: T.ink2, lineHeight: 1.6, marginTop: 16 }}>Bu eğitim videosu, tüm çalışanların yıl içinde tamamlaması gereken zorunlu içeriklerden biridir. İzleme durumunuz otomatik olarak kaydedilir ve İK paneline yansır.</p>
        </div>
      </window.Screen>
    );
  }

  Object.assign(window.SCREENS, {
    home: { C: Home },
    survey: { C: Survey, full: true },
    video: { C: Video, full: true },
  });
})();

</script>

<script type="text/babel" data-file="screens-benefits.jsx">
// screens-benefits.jsx — Yan Haklar grid, campaign list/detail, gift cards.
(function () {
  const { T, fmt, hexA, Btn, Panel, Row, Badge, Ph } = window;
  const Icon = window.Icon;
  window.SCREENS = window.SCREENS || {};

  function TabTitle({ title, sub }) {
    return (
      <div style={{ paddingTop: window.STATUS_H, background: T.card, borderBottom: `1px solid ${T.line2}`, position: 'relative', zIndex: 20 }}>
        <div style={{ padding: '12px 18px 16px' }}>
          {sub && <div style={{ fontSize: 13, color: T.ink2, fontWeight: 600 }}>{sub}</div>}
